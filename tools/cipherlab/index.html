<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Cipher Lab</title>
  <style>
    :root{
      --bg:#05070c;
      --panel: rgba(6,10,18,.72);
      --panel2: rgba(10,16,28,.45);
      --border: rgba(124,255,178,.18);
      --border2: rgba(110,168,255,.18);
      --text: rgba(230,245,255,.92);
      --muted: rgba(200,220,255,.72);
      --a: rgba(124,255,178,.95);
      --b: rgba(110,168,255,.90);
      --shadow: 0 30px 110px rgba(0,0,0,.65);
      --mono: ui-monospace, Menlo, Consolas, monospace;
    }
    html,body{height:100%; margin:0; background:radial-gradient(900px 700px at 40% 20%, rgba(124,255,178,.10), rgba(0,0,0,.92)), var(--bg); color:var(--text); font-family: var(--mono);}
    *{box-sizing:border-box;}
    a{color:inherit; text-decoration:none;}

    .topbar{
      position:sticky; top:0; z-index:5;
      padding:14px;
      border-bottom: 1px solid rgba(124,255,178,.10);
      background: rgba(5,7,12,.65);
      backdrop-filter: blur(10px);
    }
    .topbarInner{
      max-width: 1280px; margin:0 auto;
      display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;
    }
    .brand{display:flex; gap:12px; align-items:center;}
    .orb{
      width:40px; height:40px; border-radius: 14px;
      background:
        radial-gradient(circle at 30% 30%, rgba(124,255,178,.95), rgba(124,255,178,.2) 48%, transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(110,168,255,.9), rgba(110,168,255,.15) 55%, transparent 60%),
        linear-gradient(135deg, rgba(255,77,109,.16), rgba(124,255,178,.10));
      box-shadow: 0 0 0 1px rgba(124,255,178,.20), 0 18px 60px rgba(124,255,178,.10);
    }
    .title{margin:0; font-size:14px; letter-spacing:.9px; text-transform:uppercase; color: var(--a);}
    .subtitle{margin:6px 0 0; font-size:12px; color: var(--muted);}

    .actions{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .btn{
      border:1px solid rgba(110,168,255,.20);
      background: rgba(10,16,28,.45);
      color: var(--text);
      padding:10px 12px;
      border-radius:999px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      display:flex; align-items:center; gap:8px;
      font-family: var(--mono);
      font-size: 12px;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(124,255,178,.35); background: rgba(10,16,28,.62); }
    .btn.primary{ border-color: rgba(124,255,178,.26); background: rgba(124,255,178,.10); }

    .wrap{max-width:1280px; margin:0 auto; padding:14px;}
    .grid{display:grid; grid-template-columns: 340px 1fr; gap:14px;}
    @media (max-width: 980px){ .grid{grid-template-columns:1fr;} }

    .card{
      border:1px solid var(--border);
      background: var(--panel);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding:14px;
    }

    /* Collapsible groups */
    .group{
      border: 1px solid rgba(110,168,255,.14);
      background: rgba(10,16,28,.28);
      border-radius: 16px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .groupHead{
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      padding: 10px 12px;
      cursor:pointer;
      user-select:none;
    }
    .groupTitle{
      font-size:12px;
      color: rgba(124,255,178,.85);
      text-transform:uppercase;
      letter-spacing:.8px;
      margin:0;
    }
    .chev{ color: rgba(200,220,255,.70); font-size: 12px; }
    .groupBody{ padding: 0 10px 10px; display: none; }
    .group.open .groupBody{ display:block; }

    .item{
      display:flex; justify-content:space-between; gap:10px; align-items:center;
      padding:10px 10px;
      border:1px solid rgba(110,168,255,.14);
      border-radius: 14px;
      background: rgba(10,16,28,.35);
      cursor:pointer; user-select:none;
      margin-top: 8px;
      transition: border-color .12s ease, background .12s ease, transform .12s ease;
    }
    .item:hover{ transform: translateY(-1px); border-color: rgba(124,255,178,.26); background: rgba(10,16,28,.55); }
    .item.on{ border-color: rgba(124,255,178,.40); background: rgba(124,255,178,.08); }
    .badge{
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(110,168,255,.22);
      background: rgba(110,168,255,.08);
      color: rgba(230,241,255,.9);
      white-space:nowrap;
    }

    .workspaceHead{
      display:flex; justify-content:space-between; gap:12px; align-items:flex-start; flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .wsTitle{margin:0; font-size:18px; letter-spacing:.4px; color: rgba(230,245,255,.92);}
    .wsHint{margin:6px 0 0; font-size:12px; color: var(--muted); line-height:1.45;}
    .pillRow{display:flex; gap:8px; flex-wrap:wrap;}
    .pill{
      font-size:11px; padding:6px 10px; border-radius:999px;
      border:1px solid rgba(124,255,178,.18);
      background: rgba(124,255,178,.06);
      color: rgba(230,245,255,.9);
      cursor:pointer; user-select:none;
    }
    .pill.on{ border-color: rgba(124,255,178,.40); background: rgba(124,255,178,.10); }

    label{font-size:12px; color: var(--muted);}
    input, textarea{
      width:100%;
      background: rgba(0,0,0,.30);
      color: var(--text);
      border:1px solid rgba(110,168,255,.18);
      border-radius: 14px;
      padding:10px 12px;
      outline:none;
      font-family: var(--mono);
    }
    textarea{min-height: 170px; resize: vertical;}
    .two{display:grid; grid-template-columns: 1fr 1fr; gap:12px;}
    @media (max-width: 980px){ .two{grid-template-columns:1fr;} }
    .note{font-size:12px; color: var(--muted); line-height:1.45;}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbarInner">
      <div class="brand">
        <div class="orb"></div>
        <div>
          <div class="title">Cipher Lab</div>
          <div class="subtitle">Classical · Modern · Text · Convert</div>
        </div>
      </div>

      <div class="actions">
        <a class="btn" href="/" title="Galaxy"><span>☄</span><span>Galaxy</span></a>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="grid">
      <div class="card" id="nav"></div>
      <div class="card" id="main"></div>
    </div>
  </div>

  <script>
    const A="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const mod=(n,m)=>((n%m)+m)%m;
    const onlyAZ=s=>(s||"").toUpperCase().replace(/[^A-Z]/g,"");

    function caesar(text, shift){
      const s=String(text||"");
      return s.replace(/[a-z]/gi, ch=>{
        const up=ch.toUpperCase();
        const i=A.indexOf(up);
        if(i<0) return ch;
        const out=A[mod(i+shift,26)];
        return ch===up? out : out.toLowerCase();
      });
    }
    function atbash(text){
      const s=String(text||"");
      return s.replace(/[a-z]/gi, ch=>{
        const up=ch.toUpperCase();
        const i=A.indexOf(up);
        if(i<0) return ch;
        const out=A[25-i];
        return ch===up? out : out.toLowerCase();
      });
    }
    function vigenere(text, key, decrypt=false){
      const s=String(text||"");
      const k=onlyAZ(key||"");
      if(!k) return s;
      let ki=0;
      return s.replace(/[a-z]/gi, ch=>{
        const up=ch.toUpperCase();
        const i=A.indexOf(up);
        if(i<0) return ch;
        const ks=A.indexOf(k[ki++ % k.length]);
        const j=decrypt? mod(i-ks,26) : mod(i+ks,26);
        const out=A[j];
        return ch===up? out : out.toLowerCase();
      });
    }
    function groupEvery(s,n,sep=" "){
      n=Math.max(1,Number(n)||5);
      s=String(s||"");
      const out=[];
      for(let i=0;i<s.length;i+=n) out.push(s.slice(i,i+n));
      return out.join(sep);
    }
    function newlineEvery(s,n){
      n=Math.max(1,Number(n)||50);
      s=String(s||"");
      const out=[];
      for(let i=0;i<s.length;i+=n) out.push(s.slice(i,i+n));
      return out.join("\n");
    }

    const enc=new TextEncoder();
    const dec=new TextDecoder();
    const toHex=(bytes)=>Array.from(bytes).map(b=>b.toString(16).padStart(2,"0")).join("");
    const b64encode=(bytes)=>btoa(String.fromCharCode(...bytes));
    const b64decode=(b64)=>new Uint8Array(Array.from(atob(b64), c=>c.charCodeAt(0)));

    async function aesGcmEncrypt(plaintext, pass){
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name:"PBKDF2", salt, iterations: 150000, hash:"SHA-256" },
        keyMaterial,
        { name:"AES-GCM", length:256 },
        false,
        ["encrypt"]
      );
      const ct = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, key, enc.encode(plaintext));
      const out = new Uint8Array([...salt, ...iv, ...new Uint8Array(ct)]);
      return b64encode(out);
    }

    async function aesGcmDecrypt(b64, pass){
      const bytes = b64decode(b64);
      if(bytes.length < 16+12+1) throw new Error("Ciphertext too short.");
      const salt = bytes.slice(0,16);
      const iv = bytes.slice(16,28);
      const ct = bytes.slice(28);
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name:"PBKDF2", salt, iterations: 150000, hash:"SHA-256" },
        keyMaterial,
        { name:"AES-GCM", length:256 },
        false,
        ["decrypt"]
      );
      const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
      return dec.decode(new Uint8Array(pt));
    }

    async function hmacSha256(msg, keyStr){
      const key = await crypto.subtle.importKey("raw", enc.encode(keyStr), { name:"HMAC", hash:"SHA-256" }, false, ["sign"]);
      const sig = await crypto.subtle.sign("HMAC", key, enc.encode(msg));
      return toHex(new Uint8Array(sig));
    }

    // Convert is now TOP
    const NAV = [
      { group:"Convert", defaultOpen:true, items:[
        { id:"preview", name:"Conversions preview", badge:"b64/hex/ascii/dec" },
      ]},
      { group:"Classical", defaultOpen:true, items:[
        { id:"caesar", name:"Caesar", badge:"shift" },
        { id:"atbash", name:"Atbash", badge:"mirror" },
        { id:"vigenere", name:"Vigenère", badge:"tabula" },
      ]},
      { group:"Modern", defaultOpen:false, items:[
        { id:"aes", name:"AES-GCM (WebCrypto)", badge:"browser" },
        { id:"hmac", name:"HMAC-SHA256", badge:"auth" },
      ]},
      { group:"Text", defaultOpen:false, items:[
        { id:"groupx", name:"Group every X chars", badge:"format" },
        { id:"newlines", name:"New line every X chars", badge:"format" },
        { id:"clean", name:"Remove spaces", badge:"clean" },
        { id:"reverse", name:"Reverse", badge:"flip" },
        { id:"upper", name:"Uppercase", badge:"case" },
        { id:"lower", name:"Lowercase", badge:"case" },
      ]},
    ];

    let state = { id:"preview", decrypt:false };
    const elNav=document.getElementById("nav");
    const elMain=document.getElementById("main");

    function renderNav(){
      elNav.innerHTML = "";

      NAV.forEach(g=>{
        const group = document.createElement("div");
        group.className = "group" + (g.defaultOpen ? " open" : "");
        group.dataset.group = g.group;

        const head = document.createElement("div");
        head.className = "groupHead";
        head.innerHTML = `<p class="groupTitle">${g.group}</p><div class="chev">▾</div>`;
        head.onclick = ()=>{
          group.classList.toggle("open");
          head.querySelector(".chev").textContent = group.classList.contains("open") ? "▾" : "▸";
        };

        const body = document.createElement("div");
        body.className = "groupBody";

        g.items.forEach(it=>{
          const row=document.createElement("div");
          row.className="item" + (state.id===it.id ? " on":"");
          row.innerHTML = `<div>${it.name}</div><div class="badge">${it.badge}</div>`;
          row.onclick=()=>{ state.id=it.id; state.decrypt=false; render(); };
          body.appendChild(row);
        });

        group.appendChild(head);
        group.appendChild(body);
        elNav.appendChild(group);
      });

      const hint=document.createElement("div");
      hint.className="note";
      hint.style.marginTop="12px";
      hint.textContent="More tools later: Playfair, Hill, Rail Fence, Columnar, Polybius, etc — this is the clean base.";
      elNav.appendChild(hint);
    }

    function renderMain(){
      elMain.innerHTML="";

      const titleMap = {
        preview: ["Conversions preview", "See input as ascii/hex/base64/decimal bytes."],
        caesar: ["Caesar", "Fast monoalphabetic shift."],
        atbash: ["Atbash", "Alphabet mirror."],
        vigenere: ["Vigenère", "Classic tabula recta polyalphabetic."],
        aes: ["AES-GCM (WebCrypto)", "Client-side modern encryption demo."],
        hmac: ["HMAC-SHA256", "Message authentication tag (hex)."],
        groupx: ["Group every X chars", "Formatting tool."],
        newlines: ["New line every X chars", "Formatting tool."],
        clean: ["Remove spaces", "Cleanup tool."],
        reverse: ["Reverse", "Text tool."],
        upper: ["Uppercase", "Text tool."],
        lower: ["Lowercase", "Text tool."],
      };

      const [t, hint] = titleMap[state.id] || ["Tool", "—"];

      const head=document.createElement("div");
      head.className="workspaceHead";
      head.innerHTML = `
        <div>
          <h2 class="wsTitle">${t}</h2>
          <div class="wsHint">${hint}</div>
        </div>
        <div class="pillRow" id="pills"></div>
      `;
      elMain.appendChild(head);

      const pills=document.getElementById("pills");
      if(["caesar","vigenere","aes"].includes(state.id)){
        const p=document.createElement("div");
        p.className="pill " + (state.decrypt ? "on":"");
        p.textContent = state.decrypt ? "mode: decrypt" : "mode: encrypt";
        p.onclick=()=>{ state.decrypt=!state.decrypt; render(); };
        pills.appendChild(p);
      } else {
        pills.innerHTML = `<div class="pill on">live</div>`;
      }

      const grid=document.createElement("div");
      grid.className="two";
      grid.innerHTML = `
        <div>
          <label>Input</label>
          <textarea id="in" placeholder="paste text…"></textarea>
          <div style="height:10px"></div>
          <div id="controls"></div>
        </div>
        <div>
          <label>Output</label>
          <textarea id="out" readonly placeholder="output…"></textarea>
          <div style="height:10px"></div>
          <div class="note" id="note"></div>
        </div>
      `;
      elMain.appendChild(grid);

      const $in=document.getElementById("in");
      const $out=document.getElementById("out");
      const $controls=document.getElementById("controls");
      const $note=document.getElementById("note");

      function setControls(html){
        $controls.innerHTML = html;
        $controls.querySelectorAll("input").forEach(inp=> inp.addEventListener("input", update));
      }

      async function update(){
        try{
          const input = $in.value;

          if(state.id === "preview"){
            const bytes = enc.encode(input);
            const asAscii = (()=>{ try { return dec.decode(bytes); } catch { return "[invalid utf-8]"; }})();
            const asHex = toHex(bytes);
            const asB64 = b64encode(bytes);
            const asDec = Array.from(bytes).join(" ");
            $out.value =
`ASCII/UTF-8:
${asAscii}

HEX:
${asHex}

BASE64:
${asB64}

DECIMAL BYTES:
${asDec}`;
            $note.textContent = "Currently treats input as UTF-8 bytes. Later we can add selectable input modes (hex/b64/dec).";
            return;
          }

          if(state.id === "caesar"){
            const shift = Number(document.getElementById("shift")?.value ?? 3);
            $out.value = caesar(input, state.decrypt ? -shift : shift);
            $note.textContent = "";
            return;
          }
          if(state.id === "atbash"){
            $out.value = atbash(input);
            $note.textContent = "";
            return;
          }
          if(state.id === "vigenere"){
            const key = document.getElementById("key")?.value ?? "Zombies";
            $out.value = vigenere(input, key, state.decrypt);
            $note.textContent = "";
            return;
          }
          if(state.id === "aes"){
            const pass = document.getElementById("pass")?.value ?? "Zombies";
            $out.value = state.decrypt ? await aesGcmDecrypt(input.trim(), pass) : await aesGcmEncrypt(input, pass);
            $note.textContent = "Output format: base64(salt||iv||ciphertext).";
            return;
          }
          if(state.id === "hmac"){
            const key = document.getElementById("hkey")?.value ?? "Zombies";
            $out.value = await hmacSha256(input, key);
            $note.textContent = "Hex signature.";
            return;
          }
          if(state.id === "groupx"){
            const x = Number(document.getElementById("x")?.value ?? 5);
            $out.value = groupEvery(input, x, " ");
            $note.textContent = "";
            return;
          }
          if(state.id === "newlines"){
            const x = Number(document.getElementById("x")?.value ?? 50);
            $out.value = newlineEvery(input, x);
            $note.textContent = "";
            return;
          }
          if(state.id === "clean"){
            $out.value = input.replace(/\s+/g,"");
            $note.textContent = "";
            return;
          }
          if(state.id === "reverse"){
            $out.value = input.split("").reverse().join("");
            $note.textContent = "";
            return;
          }
          if(state.id === "upper"){
            $out.value = input.toUpperCase();
            $note.textContent = "";
            return;
          }
          if(state.id === "lower"){
            $out.value = input.toLowerCase();
            $note.textContent = "";
            return;
          }

          $out.value = input;
          $note.textContent = "";
        }catch(e){
          $out.value = "Error: " + (e?.message ?? String(e));
        }
      }

      if(state.id === "caesar") setControls(`<label>Shift</label><input id="shift" type="number" value="3" />`);
      else if(state.id === "vigenere") setControls(`<label>Key</label><input id="key" value="Zombies" />`);
      else if(state.id === "aes") setControls(`<label>Password</label><input id="pass" value="Zombies" />`);
      else if(state.id === "hmac") setControls(`<label>Key</label><input id="hkey" value="Zombies" />`);
      else if(state.id === "groupx") setControls(`<label>X</label><input id="x" type="number" value="5" />`);
      else if(state.id === "newlines") setControls(`<label>X</label><input id="x" type="number" value="50" />`);
      else $controls.innerHTML = `<div class="note">Paste input. Output updates live.</div>`;

      $in.addEventListener("input", update);
      update();
    }

    function render(){
      renderNav();
      renderMain();
    }

    render();
  </script>
</body>
</html>
