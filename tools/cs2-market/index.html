<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CS2 Market</title>
  <style>
    :root{
      --bg:#05070c;
      --panel: rgba(6,10,18,.72);
      --panel2: rgba(10,16,28,.45);
      --border: rgba(124,255,178,.18);
      --border2: rgba(110,168,255,.18);
      --text: rgba(230,245,255,.92);
      --muted: rgba(200,220,255,.72);
      --a: rgba(110,168,255,.95);
      --g: rgba(124,255,178,.92);
      --shadow: 0 30px 110px rgba(0,0,0,.65);
    }
    html,body{height:100%; margin:0; background:radial-gradient(900px 700px at 40% 20%, rgba(110,168,255,.12), rgba(0,0,0,.92)), var(--bg); color:var(--text); font-family: ui-monospace, Menlo, Consolas, monospace;}
    *{box-sizing:border-box;}
    a{color:inherit; text-decoration:none;}

    .topbar{
      position:sticky; top:0; z-index:5;
      padding:14px;
      border-bottom: 1px solid rgba(124,255,178,.10);
      background: rgba(5,7,12,.65);
      backdrop-filter: blur(10px);
    }
    .topbarInner{
      max-width: 1280px; margin:0 auto;
      display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;
    }
    .brand{display:flex; gap:12px; align-items:center;}
    .orb{
      width:40px; height:40px; border-radius: 14px;
      background:
        radial-gradient(circle at 30% 30%, rgba(110,168,255,.95), rgba(110,168,255,.2) 48%, transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(124,255,178,.9), rgba(124,255,178,.15) 55%, transparent 60%),
        linear-gradient(135deg, rgba(255,77,109,.16), rgba(110,168,255,.10));
      box-shadow: 0 0 0 1px rgba(110,168,255,.20), 0 18px 60px rgba(110,168,255,.10);
    }
    .title{margin:0; font-size:14px; letter-spacing:.9px; text-transform:uppercase; color: var(--a);}
    .subtitle{margin:6px 0 0; font-size:12px; color: var(--muted);}

    .actions{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .btn{
      border:1px solid rgba(110,168,255,.20);
      background: rgba(10,16,28,.45);
      color: var(--text);
      padding:10px 12px;
      border-radius:999px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(124,255,178,.35); background: rgba(10,16,28,.62); }
    .btn.primary{ border-color: rgba(124,255,178,.26); background: rgba(124,255,178,.10); }

    .wrap{max-width:1280px; margin:0 auto; padding:14px;}
    .grid{display:grid; grid-template-columns: 380px 1fr; gap:14px;}
    @media (max-width: 980px){ .grid{grid-template-columns:1fr;} }

    .card{
      border:1px solid var(--border);
      background: var(--panel);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding:14px;
    }

    .kpiGrid{display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;}
    @media (max-width: 980px){ .kpiGrid{grid-template-columns:1fr;} }
    .kpi{
      border:1px solid rgba(110,168,255,.16);
      background: rgba(10,16,28,.35);
      border-radius: 18px;
      padding: 12px;
    }
    .kpiTitle{font-size:11px; color: var(--muted); text-transform:uppercase; letter-spacing:.8px;}
    .kpiVal{margin-top:8px; font-size:18px; color: rgba(230,245,255,.92);}
    .kpiVal.good{color: var(--g);}

    .sectionTitle{
      margin:0 0 10px;
      font-size:12px;
      color: rgba(124,255,178,.85);
      text-transform:uppercase;
      letter-spacing:.8px;
    }

    input, textarea{
      width:100%;
      background: rgba(0,0,0,.30);
      color: var(--text);
      border:1px solid rgba(110,168,255,.18);
      border-radius: 14px;
      padding:10px 12px;
      outline:none;
    }

    .listItem{
      border:1px solid rgba(110,168,255,.14);
      background: rgba(10,16,28,.35);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 8px;
      display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
    }
    .name{color: rgba(230,245,255,.92); font-size:12px;}
    .meta{color: rgba(200,220,255,.72); font-size:11px; margin-top:5px; line-height:1.45;}
    .note{font-size:12px; color: var(--muted); line-height:1.45;}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbarInner">
      <div class="brand">
        <div class="orb"></div>
        <div>
          <div class="title">CS2 Market</div>
          <div class="subtitle">Watchlist · Portfolio · Signals (UI first)</div>
        </div>
      </div>

      <div class="actions">
        <a class="btn" href="/">back to solar system</a>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="kpiGrid">
      <div class="kpi">
        <div class="kpiTitle">Watchlist items</div>
        <div class="kpiVal good" id="k1">—</div>
      </div>
      <div class="kpi">
        <div class="kpiTitle">Portfolio holdings</div>
        <div class="kpiVal" id="k2">—</div>
      </div>
      <div class="kpi">
        <div class="kpiTitle">Signals flagged</div>
        <div class="kpiVal" id="k3">—</div>
      </div>
    </div>

    <div style="height:14px"></div>

    <div class="grid">
      <div class="card">
        <div class="sectionTitle">Watchlist</div>
        <div class="note">Local-only for now. Add items you care about.</div>
        <div style="height:10px"></div>
        <div class="row">
          <button class="btn primary" id="addW">add</button>
          <button class="btn" id="demo">demo signals</button>
        </div>
        <div style="height:12px"></div>
        <div id="watch"></div>
      </div>

      <div class="card">
        <div class="sectionTitle">Portfolio</div>
        <div class="note">Track what you own (qty + buy). Data wiring later.</div>
        <div style="height:10px"></div>
        <div class="row">
          <button class="btn primary" id="addP">add</button>
        </div>
        <div style="height:12px"></div>
        <div id="port"></div>

        <div style="height:14px"></div>
        <div class="sectionTitle">Signals</div>
        <div class="note" id="sigNote">Run demo to simulate anomaly flags.</div>
      </div>
    </div>
  </div>

  <script>
    const LS = {
      watch:"cs2_watch_v2",
      port:"cs2_port_v2",
    };

    function load(key, fallback){
      try{ const v = JSON.parse(localStorage.getItem(key)); return v ?? fallback; }catch{ return fallback; }
    }
    function save(key, v){ localStorage.setItem(key, JSON.stringify(v)); }

    let watch = load(LS.watch, [
      { name:"AK-47 | Redline (FT)", notes:"" },
      { name:"AWP | Asiimov (BS)", notes:"" },
    ]);
    let port = load(LS.port, [
      { name:"M4A1-S | Printstream (FT)", qty:1, buy:0, notes:"" },
    ]);

    let demoSignals = [];

    const elWatch = document.getElementById("watch");
    const elPort = document.getElementById("port");
    const k1 = document.getElementById("k1");
    const k2 = document.getElementById("k2");
    const k3 = document.getElementById("k3");
    const sigNote = document.getElementById("sigNote");

    function render(){
      k1.textContent = String(watch.length);
      k2.textContent = String(port.reduce((a,x)=>a+(Number(x.qty)||0),0));
      k3.textContent = String(demoSignals.length);

      elWatch.innerHTML = "";
      watch.forEach((it, i)=>{
        const div = document.createElement("div");
        div.className="listItem";
        div.innerHTML = `
          <div>
            <div class="name">${it.name}</div>
            <div class="meta">${it.notes ? it.notes : "—"}</div>
          </div>
          <div class="row">
            <button class="btn" data-e="editW" data-i="${i}">edit</button>
            <button class="btn" data-e="delW" data-i="${i}">del</button>
          </div>
        `;
        elWatch.appendChild(div);
      });

      elPort.innerHTML = "";
      port.forEach((it, i)=>{
        const div = document.createElement("div");
        div.className="listItem";
        div.innerHTML = `
          <div>
            <div class="name">${it.qty}× ${it.name}</div>
            <div class="meta">buy: ${it.buy || 0}${it.notes ? " · " + it.notes : ""}</div>
          </div>
          <div class="row">
            <button class="btn" data-e="editP" data-i="${i}">edit</button>
            <button class="btn" data-e="delP" data-i="${i}">del</button>
          </div>
        `;
        elPort.appendChild(div);
      });

      if(demoSignals.length){
        sigNote.textContent = demoSignals.map(s=>`• ${s}`).join("\n");
        sigNote.style.whiteSpace="pre-wrap";
      } else {
        sigNote.textContent = "Run demo to simulate anomaly flags.";
        sigNote.style.whiteSpace="normal";
      }

      save(LS.watch, watch);
      save(LS.port, port);
    }

    document.getElementById("addW").onclick = ()=>{
      const name = prompt("Item name:", "");
      if(!name) return;
      const notes = prompt("Notes (optional):", "") || "";
      watch.push({ name, notes });
      render();
    };

    document.getElementById("addP").onclick = ()=>{
      const name = prompt("Holding name:", "");
      if(!name) return;
      const qty = Number(prompt("Qty:", "1") || 1);
      const buy = Number(prompt("Buy price:", "0") || 0);
      const notes = prompt("Notes (optional):", "") || "";
      port.push({ name, qty, buy, notes });
      render();
    };

    document.getElementById("demo").onclick = ()=>{
      // Pure UI demo
      demoSignals = watch.slice(0, 10).map(it=>{
        const pct = (Math.random()*28 + 2).toFixed(1);
        const spread = (Math.random()*18 + 1).toFixed(1);
        return `${it.name} — Δ24h ${pct}% · spread ${spread}%`;
      });
      render();
    };

    document.body.addEventListener("click", (e)=>{
      const btn = e.target.closest("button");
      if(!btn) return;
      const ev = btn.dataset.e;
      const i = Number(btn.dataset.i);
      if(ev === "editW"){
        const it = watch[i];
        const name = prompt("Item name:", it.name) ?? it.name;
        const notes = prompt("Notes:", it.notes) ?? it.notes;
        watch[i] = { ...it, name, notes };
        render();
      }
      if(ev === "delW"){
        if(confirm("Delete?")){ watch.splice(i,1); render(); }
      }
      if(ev === "editP"){
        const it = port[i];
        const name = prompt("Holding name:", it.name) ?? it.name;
        const qty = Number(prompt("Qty:", String(it.qty)) ?? it.qty);
        const buy = Number(prompt("Buy price:", String(it.buy)) ?? it.buy);
        const notes = prompt("Notes:", it.notes) ?? it.notes;
        port[i] = { ...it, name, qty, buy, notes };
        render();
      }
      if(ev === "delP"){
        if(confirm("Delete?")){ port.splice(i,1); render(); }
      }
    });

    render();
  </script>
</body>
</html>
