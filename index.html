<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>kvorr // 3D</title>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; background:#05070c; }
    canvas { display:block; }
    .overlay{
      position:fixed; left:14px; top:14px;
      font-family: monospace;
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(120,255,200,.2);
      padding:10px 12px;
      border-radius:14px;
      color:#e6f1ff;
      font-size:12px;
      z-index:10;
    }
  </style>
</head>
<body>
  <div class="overlay">
    kvorr // 3D<br/>
    drag = orbit · scroll = zoom · click nodes = open
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // Scene
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x05070c, 0.03);

    const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 2000);
    camera.position.set(0, 4.2, 12);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // Lights
    scene.add(new THREE.AmbientLight(0x88aaff, 0.6));

    const key = new THREE.DirectionalLight(0x7cffb2, 1.2);
    key.position.set(6,10,6);
    scene.add(key);

    const rim = new THREE.DirectionalLight(0x6ea8ff, 0.7);
    rim.position.set(-10,2,-6);
    scene.add(rim);

    // Stars
    const starGeo = new THREE.BufferGeometry();
    const starCount = 1500;
    const starPos = new Float32Array(starCount*3);

    for(let i=0;i<starCount;i++){
      const r = 150 + Math.random()*400;
      const theta = Math.random()*Math.PI*2;
      const u = Math.random()*2 - 1;
      const phi = Math.acos(u);

      starPos[i*3+0] = r*Math.sin(phi)*Math.cos(theta);
      starPos[i*3+1] = r*Math.cos(phi);
      starPos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
    }

    starGeo.setAttribute("position", new THREE.BufferAttribute(starPos,3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ size:1 })));

    // Planet
    const planetGroup = new THREE.Group();
    scene.add(planetGroup);

    const geo = new THREE.IcosahedronGeometry(2.6, 3);

    const planet = new THREE.Mesh(
      geo,
      new THREE.MeshStandardMaterial({
        color: 0x0b1220,
        emissive: 0x08101c,
        emissiveIntensity: 1.1,
        roughness: 0.35,
        metalness: 0.3
      })
    );
    planetGroup.add(planet);

    const wire = new THREE.Mesh(
      geo,
      new THREE.MeshBasicMaterial({
        color: 0x7cffb2,
        wireframe:true,
        transparent:true,
        opacity:0.25
      })
    );
    planetGroup.add(wire);

    // Orbit ring
    const radius = 6.2;
    const orbit = new THREE.Mesh(
      new THREE.RingGeometry(radius-0.02, radius+0.02, 180),
      new THREE.MeshBasicMaterial({
        color:0x7cffb2,
        transparent:true,
        opacity:0.12,
        side: THREE.DoubleSide
      })
    );
    orbit.rotation.x = Math.PI/2;
    scene.add(orbit);

    // Nodes
    const projects = [
      { name:"Slot 01", url:"/games/slot01/" },
      { name:"Claw", url:"/games/claw/" },
      { name:"Cipher Lab", url:"/tools/cipherlab/" },
      { name:"Microgame", url:"/games/microgame/" }
    ];

    const nodes = [];
    const nodeGroup = new THREE.Group();
    scene.add(nodeGroup);

    projects.forEach((p,i)=>{
      const g = new THREE.Group();

      const node = new THREE.Mesh(
        new THREE.SphereGeometry(0.32, 24, 24),
        new THREE.MeshStandardMaterial({
          color:0x08101c,
          emissive:0x7cffb2,
          emissiveIntensity:2
        })
      );

      node.userData = p;
      g.add(node);

      const t = (i/projects.length)*Math.PI*2;
      const y = (i-(projects.length-1)/2)*0.6;

      g.position.set(Math.cos(t)*radius, y, Math.sin(t)*radius);

      nodeGroup.add(g);
      nodes.push({g,node,t,y});
    });

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;

    // Picking
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hovered = null;

    addEventListener("pointermove",(ev)=>{
      mouse.x = (ev.clientX/innerWidth)*2 -1;
      mouse.y = -(ev.clientY/innerHeight)*2 +1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(nodes.map(n=>n.node), false);

      if(hits.length){
        const hit = hits[0].object;
        if(hovered !== hit){
          if(hovered) hovered.material.emissiveIntensity = 2;
          hovered = hit;
          hovered.material.emissiveIntensity = 3.5;
          document.body.style.cursor="pointer";
        }
      } else {
        if(hovered) hovered.material.emissiveIntensity = 2;
        hovered = null;
        document.body.style.cursor="default";
      }
    });

    addEventListener("click",()=>{
      if(!hovered) return;
      const p = hovered.userData;
      if(p && p.url) location.href = p.url;
    });

    // Animate
    let last = performance.now();
    function animate(now){
      const dt = Math.min((now-last)/1000,0.05);
      last = now;

      planetGroup.rotation.y += dt*0.4;
      wire.rotation.y += dt*0.25;

      nodes.forEach((n,i)=>{
        n.t += dt*(0.34+i*0.03);
        const r = radius;
        n.g.position.x = Math.cos(n.t)*r;
        n.g.position.z = Math.sin(n.t)*r;
      });

      controls.update();
      renderer.render(scene,camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    addEventListener("resize",()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });
  </script>
</body>
</html>
