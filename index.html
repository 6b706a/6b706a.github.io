<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>kvorr // 3D</title>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; background:#05070c; }
    canvas { display:block; }

    .hud{
      position:fixed; inset:0; z-index:10;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      color: rgba(230,245,255,.92);
      pointer-events:none;
    }
    .topbar{
      pointer-events:auto;
      position:absolute; left:14px; right:14px; top:14px;
      display:flex; gap:12px; flex-wrap:wrap;
      align-items:flex-start; justify-content:space-between;
      padding:12px 14px;
      border-radius: 18px;
      background: rgba(6,10,18,.58);
      border: 1px solid rgba(124,255,178,.18);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 70px rgba(0,0,0,.55);
    }
    .brand{ display:flex; gap:12px; align-items:flex-start; }
    .orb{
      width: 38px; height: 38px; border-radius: 14px;
      background:
        radial-gradient(circle at 30% 30%, rgba(124,255,178,.95), rgba(124,255,178,.2) 48%, transparent 55%),
        radial-gradient(circle at 70% 70%, rgba(110,168,255,.9), rgba(110,168,255,.15) 55%, transparent 60%),
        linear-gradient(135deg, rgba(255,77,109,.18), rgba(124,255,178,.12));
      box-shadow: 0 0 0 1px rgba(124,255,178,.25), 0 18px 60px rgba(124,255,178,.12);
    }
    .brand h1{
      margin:0; font-size: 13px; letter-spacing:.9px; text-transform: uppercase;
      color: rgba(124,255,178,.95);
    }
    .brand .sub{
      margin-top:6px;
      font-size: 12px;
      color: rgba(200,220,255,.72);
      line-height: 1.35;
    }
    .btns{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .btn{
      pointer-events:auto;
      text-decoration:none;
      font-size:12px;
      padding:10px 12px;
      border-radius: 999px;
      border:1px solid rgba(110,168,255,.20);
      background: rgba(10,16,28,.45);
      color: rgba(230,245,255,.9);
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      user-select:none;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(124,255,178,.38); background: rgba(10,16,28,.62); }

    .panel{
      pointer-events:auto;
      position:absolute; right:14px; bottom:14px;
      width:min(380px, calc(100vw - 28px));
      padding:12px 12px 10px;
      border-radius: 18px;
      border:1px solid rgba(124,255,178,.16);
      background: rgba(6,10,18,.64);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 70px rgba(0,0,0,.55);
    }
    .panel .k{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 8px; }
    .badge{
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(110,168,255,.22);
      background: rgba(110,168,255,.08);
      color: rgba(230,241,255,.9);
      white-space:nowrap;
    }
    .panel h2{ margin: 0 0 6px; font-size: 18px; letter-spacing:.2px; }
    .panel p{ margin:0 0 10px; font-size: 12px; color: rgba(200,220,255,.72); line-height: 1.45; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; }
    .link{
      text-decoration:none;
      font-size:12px;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid rgba(124,255,178,.22);
      background: rgba(124,255,178,.08);
      color: rgba(230,245,255,.92);
    }
    .link:hover{ border-color: rgba(124,255,178,.38); }
    .muted{
      opacity:.55; cursor:not-allowed;
      border-color: rgba(110,168,255,.18) !important;
      background: rgba(10,16,28,.35) !important;
    }

    .hint{
      position:absolute; left:14px; bottom:14px;
      pointer-events:none;
      max-width:min(560px, calc(100vw - 28px));
      padding:10px 12px;
      border-radius: 16px;
      border:1px solid rgba(110,168,255,.16);
      background: rgba(6,10,18,.40);
      color: rgba(200,220,255,.72);
      font-size:12px;
      line-height: 1.45;
      backdrop-filter: blur(10px);
    }

    .fade{
      position:fixed; inset:0; z-index: 9; pointer-events:none;
      background: radial-gradient(900px 700px at 50% 50%, rgba(124,255,178,.16), rgba(0,0,0,.90));
      opacity: 0;
      transition: opacity .35s ease;
    }
    .fade.on{ opacity: 1; }
  </style>
</head>
<body>
  <div class="fade" id="fade"></div>

  <div class="hud">
    <div class="topbar">
      <div class="brand">
        <div class="orb"></div>
        <div>
          <h1>kvorr // portal vault</h1>
          <div class="sub">Clean hub. No janky orbit. Click a kiosk → Launch.</div>
        </div>
      </div>
      <div class="btns">
        <a class="btn" href="https://github.com/6b706a" target="_blank" rel="noreferrer">github</a>
        <a class="btn" href="#" id="reset">reset view</a>
      </div>
    </div>

    <div class="hint">
      Drag to orbit · Scroll to zoom · Click a kiosk to select · Launch to enter
    </div>

    <div class="panel" id="panel">
      <div class="k">
        <span class="badge" id="pTag">idle</span>
        <span class="badge" style="border-color:rgba(124,255,178,.22); background:rgba(124,255,178,.06);">online</span>
      </div>
      <h2 id="pName">Select a kiosk</h2>
      <p id="pDesc">Projects are clean kiosks around the hub (no messy orbit).</p>
      <div class="row">
        <a class="link muted" id="pLaunch" href="#" onclick="return false;">Launch</a>
        <a class="link muted" id="pMore" href="#" onclick="return false;">Details</a>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.160.0";
    import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // ========= Projects =========
    const projects = [
      { name:"Slot 01", tag:"prototype", desc:"Clean, fast slot prototype. Add build later.", url:"/games/slot01/", more:"#"},
      { name:"Claw Machine", tag:"playable", desc:"Arcade claw experiment + pixel assets.", url:"/games/claw/", more:"#"},
      { name:"Cipher Lab", tag:"tools", desc:"Crypto toys / solvers / writeups.", url:"/tools/cipherlab/", more:"#"},
      { name:"Microgame", tag:"micro", desc:"Tiny one-button weirdness. Ship small, often.", url:"/games/microgame/", more:"#"},
    ];

    // ========= UI =========
    const pName = document.getElementById("pName");
    const pDesc = document.getElementById("pDesc");
    const pTag  = document.getElementById("pTag");
    const pLaunch = document.getElementById("pLaunch");
    const pMore = document.getElementById("pMore");
    const fade = document.getElementById("fade");

    function setLink(a, url, label){
      a.textContent = label;
      if(url && url !== "#"){
        a.classList.remove("muted");
        a.href = url;
        a.target = url.startsWith("http") ? "_blank" : "_self";
        a.rel = url.startsWith("http") ? "noreferrer" : "";
      } else {
        a.classList.add("muted");
        a.href = "#";
        a.onclick = (ev)=>ev.preventDefault();
        a.removeAttribute("target");
      }
    }
    function setPanel(p){
      if(!p){
        pName.textContent = "Select a kiosk";
        pDesc.textContent = "Projects are clean kiosks around the hub (no messy orbit).";
        pTag.textContent = "idle";
        setLink(pLaunch, "#", "Launch");
        setLink(pMore, "#", "Details");
        return;
      }
      pName.textContent = p.name;
      pDesc.textContent = p.desc;
      pTag.textContent  = p.tag;
      setLink(pLaunch, p.url, "Launch");
      setLink(pMore, p.more, "Details");
    }
    setPanel(null);

    // ========= Scene / Renderer =========
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x05070c, 0.020);

    const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 3000);
    camera.position.set(0, 2.0, 40); // intro start far

    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x05070c, 1);
    document.body.appendChild(renderer.domElement);

    // ========= Infinite backdrop (no walls) =========
    // Star dome (large sphere) + stars (points). This prevents seeing any “room”.
    const domeGeo = new THREE.SphereGeometry(900, 32, 32);
    const domeMat = new THREE.MeshBasicMaterial({ color: 0x05070c, side: THREE.BackSide });
    const dome = new THREE.Mesh(domeGeo, domeMat);
    scene.add(dome);

    function addStars(count, size, rMin, rMax, opacity){
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(count*3);
      for(let i=0;i<count;i++){
        const r = rMin + Math.random()*(rMax-rMin);
        const theta = Math.random()*Math.PI*2;
        const u = Math.random()*2 - 1;
        const phi = Math.acos(u);
        pos[i*3+0] = r*Math.sin(phi)*Math.cos(theta);
        pos[i*3+1] = r*Math.cos(phi);
        pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
      }
      geo.setAttribute("position", new THREE.BufferAttribute(pos,3));
      const mat = new THREE.PointsMaterial({ size, transparent:true, opacity, depthWrite:false });
      const pts = new THREE.Points(geo, mat);
      scene.add(pts);
      return pts;
    }
    const starsNear = addStars(1400, 1.0, 120, 320, 0.75);
    const starsFar  = addStars(2200, 1.3, 260, 820, 0.55);

    // ========= Lights =========
    scene.add(new THREE.AmbientLight(0x88aaff, 0.45));
    const key = new THREE.DirectionalLight(0x7cffb2, 1.05);
    key.position.set(6,10,6);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x6ea8ff, 0.75);
    rim.position.set(-10,2,-6);
    scene.add(rim);

    // ========= Core hub =========
    const core = new THREE.Group();
    scene.add(core);

    const coreGeo = new THREE.IcosahedronGeometry(2.2, 4);
    const coreMesh = new THREE.Mesh(coreGeo, new THREE.MeshStandardMaterial({
      color: 0x07101b,
      roughness: 0.28,
      metalness: 0.50,
      emissive: 0x08101c,
      emissiveIntensity: 0.9
    }));
    core.add(coreMesh);

    const coreWire = new THREE.Mesh(coreGeo, new THREE.MeshBasicMaterial({
      color:0x7cffb2, wireframe:true, transparent:true, opacity:0.16
    }));
    core.add(coreWire);

    const glow = new THREE.Mesh(new THREE.SphereGeometry(2.75, 42, 42),
      new THREE.MeshBasicMaterial({ color:0x6ea8ff, transparent:true, opacity:0.10, depthWrite:false })
    );
    core.add(glow);

    const glow2 = new THREE.Mesh(new THREE.SphereGeometry(3.15, 42, 42),
      new THREE.MeshBasicMaterial({ color:0x7cffb2, transparent:true, opacity:0.045, depthWrite:false })
    );
    core.add(glow2);

    // ========= Clean “arcade floor” (infinite feel) =========
    // Keep it subtle so it doesn’t look like a boxed room.
    const floor = new THREE.GridHelper(220, 220, 0x7cffb2, 0x1f3b33);
    floor.material.transparent = true;
    floor.material.opacity = 0.12;
    floor.position.y = -2.8;
    scene.add(floor);

    // ========= Warp tunnel intro (clean stop) =========
    // Tie particle speed to intro velocity; fade out before the stop.
    const warpGroup = new THREE.Group();
    scene.add(warpGroup);

    const warpLen = 190;
    const warpRadius = 10.5;
    const warpCount = 3600;

    const warpGeo = new THREE.BufferGeometry();
    const warpPos = new Float32Array(warpCount*3);
    const warpCol = new Float32Array(warpCount*3);

    for(let i=0;i<warpCount;i++){
      const z = -Math.random()*warpLen;
      const a = Math.random()*Math.PI*2;
      const r = warpRadius * (0.35 + Math.random()*0.65);
      warpPos[i*3+0] = Math.cos(a)*r;
      warpPos[i*3+1] = Math.sin(a)*r;
      warpPos[i*3+2] = z;

      const g = 0.6 + Math.random()*0.4;
      const b = 0.55 + Math.random()*0.45;
      warpCol[i*3+0] = 0.22;
      warpCol[i*3+1] = g;
      warpCol[i*3+2] = b;
    }
    warpGeo.setAttribute("position", new THREE.BufferAttribute(warpPos,3));
    warpGeo.setAttribute("color", new THREE.BufferAttribute(warpCol,3));

    const warpMat = new THREE.PointsMaterial({
      size: 0.10,
      vertexColors: true,
      transparent: true,
      opacity: 0.0,
      depthWrite: false
    });

    const warpPts = new THREE.Points(warpGeo, warpMat);
    warpGroup.add(warpPts);

    function easeOutCubic(x){ return 1 - Math.pow(1-x, 3); }

    let intro = 1;
    let introT = 0;

    // ========= Kiosks (clean layout, no orbit) =========
    const kioskGroup = new THREE.Group();
    scene.add(kioskGroup);

    function makeSwirlTexture(seed=0){
      const c = document.createElement("canvas");
      c.width = 256; c.height = 256;
      const ctx = c.getContext("2d");
      const cx = 128, cy = 128;

      ctx.fillStyle = "rgba(6,10,18,1)";
      ctx.fillRect(0,0,256,256);

      for(let k=0;k<520;k++){
        const t = (k/520) * Math.PI * 10;
        const r = 10 + (k/520) * 110;
        const x = cx + Math.cos(t + seed)*r;
        const y = cy + Math.sin(t + seed)*r;
        const a = 0.07 + (k/520)*0.08;
        ctx.fillStyle = `rgba(${70+Math.floor(40*Math.sin(seed+0.7))}, ${170+Math.floor(70*Math.sin(seed+1.2))}, ${200+Math.floor(55*Math.sin(seed+2.1))}, ${a})`;
        ctx.beginPath();
        ctx.arc(x,y, 2.0 + (k/520)*2.6, 0, Math.PI*2);
        ctx.fill();
      }

      const g = ctx.createRadialGradient(cx,cy,0,cx,cy,120);
      g.addColorStop(0, "rgba(124,255,178,0.14)");
      g.addColorStop(0.55, "rgba(110,168,255,0.08)");
      g.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx,cy,120,0,Math.PI*2);
      ctx.fill();

      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    function makeLabelSprite(text){
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const pad = 14;
      const font = "12px ui-monospace, Menlo, Consolas, monospace";
      ctx.font = font;
      const w = Math.ceil(ctx.measureText(text).width) + pad*2;
      const h = 34;
      canvas.width = w*2; canvas.height = h*2;
      ctx.scale(2,2);

      ctx.fillStyle = "rgba(6,10,18,.70)";
      ctx.strokeStyle = "rgba(124,255,178,.36)";
      ctx.lineWidth = 1;
      roundRect(ctx, 0.5, 0.5, w-1, h-1, 12);
      ctx.fill(); ctx.stroke();

      ctx.fillStyle = "rgba(230,245,255,.92)";
      ctx.fillText(text, pad, 22);

      const tex = new THREE.CanvasTexture(canvas);
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;

      const mat = new THREE.SpriteMaterial({ map: tex, transparent:true, depthWrite:false });
      const spr = new THREE.Sprite(mat);
      spr.scale.set(w*0.018, h*0.018, 1);
      return spr;
    }
    function roundRect(ctx,x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r);
      ctx.arcTo(x,y,x+w,y,r);
      ctx.closePath();
    }

    const kiosks = [];
    const ringR = 8.3;

    function buildKiosk(p, i){
      const g = new THREE.Group();

      // “Cabinet” frame
      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 3.1, 1.4),
        new THREE.MeshStandardMaterial({
          color: 0x07101b,
          roughness: 0.55,
          metalness: 0.25,
          emissive: 0x05080f,
          emissiveIntensity: 0.65
        })
      );
      frame.position.y = -0.1;
      g.add(frame);

      // Screen bezel
      const bezel = new THREE.Mesh(
        new THREE.BoxGeometry(1.75, 1.55, 0.12),
        new THREE.MeshStandardMaterial({
          color: 0x0a1524,
          roughness: 0.35,
          metalness: 0.35,
          emissive: 0x06101b,
          emissiveIntensity: 1.0
        })
      );
      bezel.position.set(0, 0.55, 0.76);
      g.add(bezel);

      // Portal “screen” (circle with animated swirl texture)
      const tex = makeSwirlTexture(i*0.9);
      const screen = new THREE.Mesh(
        new THREE.CircleGeometry(0.62, 64),
        new THREE.MeshBasicMaterial({ map: tex, transparent:true, opacity: 0.96, depthWrite:false })
      );
      screen.position.set(0, 0.55, 0.83);
      g.add(screen);

      // Portal ring on top of screen
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.78, 0.11, 18, 90),
        new THREE.MeshStandardMaterial({
          color: 0x0a1524,
          emissive: 0x7cffb2,
          emissiveIntensity: 1.0,
          roughness: 0.25,
          metalness: 0.45
        })
      );
      ring.position.set(0, 0.55, 0.80);
      ring.userData.project = p;
      g.add(ring);

      // Little base glow
      const baseGlow = new THREE.Mesh(
        new THREE.CylinderGeometry(1.3, 1.3, 0.06, 32),
        new THREE.MeshBasicMaterial({ color:0x6ea8ff, transparent:true, opacity:0.10, depthWrite:false })
      );
      baseGlow.position.set(0, -1.55, 0);
      g.add(baseGlow);

      // Label
      const label = makeLabelSprite(p.name);
      label.position.set(0, 2.1, 0);
      label.material.opacity = 0.65;
      g.add(label);

      // Place evenly spaced (clean)
      const angle = (i / projects.length) * Math.PI*2;
      g.position.set(Math.cos(angle)*ringR, -0.9, Math.sin(angle)*ringR);
      g.lookAt(0, -0.9, 0);

      kioskGroup.add(g);

      kiosks.push({
        g, ring, screen, tex, label,
        hot: 0
      });
    }

    projects.forEach((p,i)=>buildKiosk(p,i));

    // ========= Controls =========
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.075;
    controls.minDistance = 7.0;
    controls.maxDistance = 28;
    controls.target.set(0, -0.4, 0);

    document.getElementById("reset").addEventListener("click",(e)=>{
      e.preventDefault();
      camera.position.set(0, 3.0, 14.8);
      controls.target.set(0, -0.4, 0);
      controls.update();
    });

    // ========= Picking / selection =========
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hovered = null;
    let selected = null;

    addEventListener("pointermove",(ev)=>{
      mouse.x = (ev.clientX/innerWidth)*2 -1;
      mouse.y = -(ev.clientY/innerHeight)*2 +1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(kiosks.map(k=>k.ring), false);

      if(hits.length){
        hovered = hits[0].object;
        document.body.style.cursor = "pointer";
      } else {
        hovered = null;
        document.body.style.cursor = "default";
      }
    });

    addEventListener("click",()=>{
      if(!hovered) return;
      selected = hovered;
      setPanel(selected.userData.project);
    });

    // ========= Enter (warp) =========
    let entering = false;
    function enterPortal(url){
      if(!url || url === "#" || entering) return;
      entering = true;
      fade.classList.add("on");

      const start = camera.position.clone();
      const t0 = performance.now();

      function step(now){
        const t = Math.min((now - t0) / 520, 1);
        const e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
        camera.position.lerpVectors(start, new THREE.Vector3(0, 0.9, 6.5), e);
        controls.update();
        if(t < 1) requestAnimationFrame(step);
        else location.href = url;
      }
      requestAnimationFrame(step);
    }

    pLaunch.addEventListener("click",(e)=>{
      if(pLaunch.classList.contains("muted")) return;
      e.preventDefault();
      enterPortal(pLaunch.getAttribute("href"));
    });

    // ========= Animate =========
    let last = performance.now();
    function animate(now){
      const dt = Math.min((now-last)/1000,0.05);
      last = now;

      // Stars parallax
      starsNear.rotation.y += dt * 0.006;
      starsFar.rotation.y  -= dt * 0.003;

      // Core motion (subtle)
      core.rotation.y += dt * 0.22;
      coreWire.rotation.y += dt * 0.14;
      glow.material.opacity  = 0.095 + Math.sin(now*0.0012)*0.008;
      glow2.material.opacity = 0.043 + Math.sin(now*0.0010 + 1.3)*0.007;

      // Floor shimmer slight
      floor.material.opacity = 0.11 + Math.sin(now*0.0013)*0.02;

      // Kiosks: tiny idle sway, and clean hover/selected glow
      kiosks.forEach((k, i)=>{
        // swirl movement
        k.tex.offset.x += dt * (0.030 + i*0.002);
        k.tex.offset.y += dt * (0.020 + i*0.0015);

        // idle breathing (not orbiting)
        k.g.position.y = -0.9 + Math.sin(now*0.0011 + i)*0.04;

        const isHover = hovered === k.ring;
        const isSel = selected === k.ring;
        const targetHot = isSel ? 1.0 : (isHover ? 0.7 : 0.0);
        k.hot += (targetHot - k.hot) * 0.10;

        k.ring.material.emissiveIntensity = 1.0 + k.hot*1.7;
        k.screen.material.opacity = 0.94 + k.hot*0.06;
        k.label.material.opacity = 0.65 + k.hot*0.30;
      });

      // Warp intro: velocity-based motion + early fade-out so no “fast particles at the end”
      if(intro){
        introT += dt;
        const t = Math.min(introT / 2.15, 1);
        const e = easeOutCubic(t);

        // Camera fly-in
        camera.position.z = 40 - e * 25.2; // 40 -> ~14.8
        camera.position.y = 2.0 + (3.0 - 2.0) * e;
        controls.target.set(0, -0.4, 0);

        // velocity (fast early, zero at end)
        const vel = (1 - t) * (1 - t); // quadratic falloff
        const speed = 50 * vel;        // strong early, near 0 at end

        // Warp opacity: fade OUT earlier (so no particles when slowing)
        const fadeOut = t < 0.75 ? (t / 0.75) : (1 - (t - 0.75) / 0.25);
        warpMat.opacity = Math.max(0, Math.min(0.95, fadeOut*0.95));

        // Move points based on speed; if speed is tiny, they basically stop
        if(speed > 0.05){
          const arr = warpGeo.attributes.position.array;
          for(let i=0;i<warpCount;i++){
            const z = arr[i*3+2] + dt * speed;
            arr[i*3+2] = (z > 6) ? (-warpLen + Math.random()*-10) : z;
          }
          warpGeo.attributes.position.needsUpdate = true;
        }

        if(t >= 1){
          intro = 0;
          warpGroup.visible = false;
          camera.position.set(0, 3.0, 14.8);
        } else {
          warpGroup.visible = true;
        }
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    addEventListener("resize",()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
