<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>kvorr</title>
  <style>
    :root{
      --bg:#05070c;
      --panel: rgba(6,10,18,.74);
      --panel2: rgba(10,16,28,.52);
      --border: rgba(124,255,178,.18);
      --border2: rgba(110,168,255,.18);
      --text: rgba(230,245,255,.92);
      --muted: rgba(200,220,255,.72);
      --a: rgba(124,255,178,.92);
      --b: rgba(110,168,255,.92);
      --shadow: 0 30px 110px rgba(0,0,0,.65);
      --mono: ui-monospace, Menlo, Consolas, monospace;
    }

    html, body { height:100%; margin:0; overflow:hidden; background:var(--bg); color:var(--text); font-family: var(--mono); }
    canvas { display:block; }

    /* CSS2D labels */
    .label {
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(230,245,255,.92);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(124,255,178,.16);
      background: rgba(6,10,18,.50);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
      white-space: nowrap;
      transform: translate(-50%, -100%);
      user-select: none;
      pointer-events: none;
    }
    .label.section {
      border-color: rgba(110,168,255,.20);
      background: rgba(10,16,28,.48);
    }

    /* Focus overlay panel */
    .ui {
      position: fixed; inset: 0; z-index: 20;
      display: grid; place-items: end center;
      padding: 16px;
      pointer-events: none;
    }
    .panel {
      pointer-events: auto;
      width: min(780px, calc(100vw - 32px));
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      padding: 14px;
      display: none;
    }
    .panel.on { display:block; }

    .head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom: 10px;
    }
    .title {
      margin:0;
      font-size: 12px;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: var(--b);
    }
    .desc {
      margin:6px 0 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      max-width: 640px;
    }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end; }

    .btn {
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(110,168,255,.20);
      background: rgba(10,16,28,.45);
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      display:flex; align-items:center; gap:8px;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(124,255,178,.34); background: rgba(10,16,28,.62); }
    .btn.primary { border-color: rgba(124,255,178,.28); background: rgba(124,255,178,.10); }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    @media (max-width: 720px){ .grid { grid-template-columns: 1fr; } }

    .moonCard{
      border-radius: 18px;
      border: 1px solid rgba(110,168,255,.14);
      background: rgba(10,16,28,.38);
      padding: 12px;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .moonCard:hover{
      transform: translateY(-1px);
      border-color: rgba(124,255,178,.28);
      background: rgba(10,16,28,.58);
    }
    .moonName{
      margin:0;
      font-size: 13px;
      color: var(--a);
      letter-spacing: .4px;
    }
    .moonMeta{
      margin:6px 0 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    /* Fade for warps */
    .fade{
      position: fixed; inset: 0; z-index: 15;
      pointer-events:none;
      background: radial-gradient(900px 700px at 50% 50%, rgba(124,255,178,.10), rgba(0,0,0,.92));
      opacity: 0;
      transition: opacity .35s ease;
    }
    .fade.on{ opacity: 1; }
  </style>
</head>
<body>
  <div class="fade" id="fade"></div>

  <div class="ui">
    <div class="panel" id="panel">
      <div class="head">
        <div>
          <h3 class="title" id="panelTitle">—</h3>
          <p class="desc" id="panelDesc">—</p>
        </div>
        <div class="row">
          <button class="btn" id="galaxyBtn" title="Galaxy">
            <span>☄</span><span>Galaxy</span>
          </button>
        </div>
      </div>
      <div class="grid" id="moonGrid"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.160.0";
    import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { CSS2DRenderer, CSS2DObject } from "https://esm.sh/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js";

    // =========================
    // CONFIG
    // =========================
    // "Planets = first subdirectories". We still hardcode what exists,
    // because GitHub Pages can't list folders.
    const SOLAR = [
      {
        id: "tools",
        label: "TOOLS",
        desc: "Utilities and labs.",
        hue: 155,
        orbitR: 30,              // spread out
        orbitSpeed: 0.035,
        size: 2.2,
        incline: 0.16,
        moons: [
          { id:"cipherlab", label:"Cipher Lab", desc:"Classical + modern crypto + transforms.", url:"/tools/cipherlab/index.html", hue: 155, size: 0.62, r: 4.8, speed: 0.28, phase: 0.4 },
          { id:"cs2", label:"CS2 Market", desc:"Watchlist + portfolio + signals (UI).", url:"/tools/cs2-market/index.html", hue: 210, size: 0.56, r: 6.2, speed: 0.22, phase: 2.0 },
        ]
      },
      {
        id: "games",
        label: "GAMES",
        desc: "Playable projects (soon).",
        hue: 205,
        orbitR: 50,              // spread out more
        orbitSpeed: 0.026,
        size: 2.7,
        incline: -0.11,
        moons: []                // show planet anyway, no moons yet
      },
    ];

    // =========================
    // DOM
    // =========================
    const panel = document.getElementById("panel");
    const panelTitle = document.getElementById("panelTitle");
    const panelDesc = document.getElementById("panelDesc");
    const moonGrid = document.getElementById("moonGrid");
    const galaxyBtn = document.getElementById("galaxyBtn");
    const fade = document.getElementById("fade");

    // =========================
    // Audio (hum + warp whoosh)
    // =========================
    // Plays on first user click (browser policy).
    let audioReady = false;
    let ctx, humOsc, humGain, whooshGain;

    function initAudio(){
      if(audioReady) return;
      audioReady = true;
      ctx = new (window.AudioContext || window.webkitAudioContext)();

      humOsc = ctx.createOscillator();
      const humOsc2 = ctx.createOscillator();
      humGain = ctx.createGain();

      humOsc.type = "sine";
      humOsc.frequency.value = 48;

      humOsc2.type = "triangle";
      humOsc2.frequency.value = 96;

      humGain.gain.value = 0.0001;

      const lp = ctx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.value = 420;

      humOsc.connect(humGain);
      humOsc2.connect(humGain);
      humGain.connect(lp);
      lp.connect(ctx.destination);

      humOsc.start();
      humOsc2.start();

      // Whoosh bus
      whooshGain = ctx.createGain();
      whooshGain.gain.value = 0.0;
      whooshGain.connect(ctx.destination);
    }

    function playWhoosh(){
      if(!audioReady || !ctx) return;
      const now = ctx.currentTime;

      const noiseBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate*0.35), ctx.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);

      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuf;

      const bp = ctx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(280, now);
      bp.frequency.exponentialRampToValueAtTime(820, now+0.25);

      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.18, now+0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, now+0.35);

      noise.connect(bp);
      bp.connect(g);
      g.connect(whooshGain);

      whooshGain.gain.setValueAtTime(0.0, now);
      whooshGain.gain.linearRampToValueAtTime(1.0, now+0.02);
      whooshGain.gain.linearRampToValueAtTime(0.0, now+0.35);

      noise.start(now);
      noise.stop(now+0.36);
    }

    // =========================
    // Scene
    // =========================
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x05070c, 0.010); // a bit lighter for "infinite"

    const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 8000);
    camera.position.set(0, 6.0, 70);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x05070c, 1);
    document.body.appendChild(renderer.domElement);

    // Labels renderer
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth, innerHeight);
    labelRenderer.domElement.style.position = "fixed";
    labelRenderer.domElement.style.inset = "0";
    labelRenderer.domElement.style.pointerEvents = "none";
    document.body.appendChild(labelRenderer.domElement);

    // Infinite dome (no box walls)
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(3000, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x05070c, side: THREE.BackSide })
    ));

    // Stars
    function addStars(count, size, rMin, rMax, opacity){
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(count*3);
      for(let i=0;i<count;i++){
        const r = rMin + Math.random()*(rMax-rMin);
        const theta = Math.random()*Math.PI*2;
        const u = Math.random()*2 - 1;
        const phi = Math.acos(u);
        pos[i*3+0] = r*Math.sin(phi)*Math.cos(theta);
        pos[i*3+1] = r*Math.cos(phi);
        pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
      }
      geo.setAttribute("position", new THREE.BufferAttribute(pos,3));
      const mat = new THREE.PointsMaterial({ size, transparent:true, opacity, depthWrite:false });
      const pts = new THREE.Points(geo, mat);
      scene.add(pts);
      return pts;
    }
    const starsNear = addStars(2400, 1.0, 260, 720, 0.72);
    const starsFar  = addStars(4200, 1.35, 650, 2400, 0.52);

    // Lights
    scene.add(new THREE.AmbientLight(0x88aaff, 0.34));
    const key = new THREE.DirectionalLight(0x7cffb2, 1.0);
    key.position.set(80,120,80);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x6ea8ff, 0.85);
    rim.position.set(-120,25,-80);
    scene.add(rim);

    // Floor grid (subtle)
    const floor = new THREE.GridHelper(2200, 440, 0x7cffb2, 0x1f3b33);
    floor.material.transparent = true;
    floor.material.opacity = 0.050;
    floor.position.y = -12.0;
    scene.add(floor);

    // =========================
    // Sun (center)
    // =========================
    const sun = new THREE.Group();
    scene.add(sun);

    const sunGeo = new THREE.IcosahedronGeometry(4.6, 6);
    const sunMat = new THREE.MeshStandardMaterial({
      color: 0x07101b, roughness: 0.18, metalness: 0.62,
      emissive: 0x08101c, emissiveIntensity: 1.1
    });
    const sunMesh = new THREE.Mesh(sunGeo, sunMat);
    sun.add(sunMesh);

    const sunWire = new THREE.Mesh(sunGeo, new THREE.MeshBasicMaterial({
      color:0x7cffb2, wireframe:true, transparent:true, opacity:0.09
    }));
    sun.add(sunWire);

    const sunGlow = new THREE.Mesh(
      new THREE.SphereGeometry(5.8, 64, 64),
      new THREE.MeshBasicMaterial({ color:0x6ea8ff, transparent:true, opacity:0.06, depthWrite:false })
    );
    sun.add(sunGlow);

    // =========================
    // Controls
    // =========================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 18;
    controls.maxDistance = 200;
    controls.target.set(0, -1.0, 0);

    const homeCamPos = new THREE.Vector3(0, 6.0, 70);
    const homeTarget = new THREE.Vector3(0, -1.0, 0);

    // =========================
    // Textures (planet ≠ moon)
    // =========================
    function makePlanetTexture(seed=1.2, hue=160){
      // Planets: "continental + tron veins"
      const c = document.createElement("canvas");
      c.width = 1024; c.height = 512;
      const ctx = c.getContext("2d");

      ctx.fillStyle = "rgb(6,10,18)";
      ctx.fillRect(0,0,c.width,c.height);

      // big noise blobs
      for(let i=0;i<1400;i++){
        const x = Math.random()*c.width;
        const y = Math.random()*c.height;
        const r = 10 + Math.random()*48;
        const a = 0.010 + Math.random()*0.030;
        ctx.fillStyle = `hsla(${hue-20 + Math.random()*40}, 85%, ${18+Math.random()*18}%, ${a})`;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }

      // tron veins
      ctx.lineWidth = 2;
      for(let i=0;i<110;i++){
        const y = (i/110) * c.height;
        const amp = 18 + (i%10)*4;
        const freq = 0.007 + (i%6)*0.001;
        ctx.strokeStyle = `hsla(${hue}, 95%, 65%, ${0.018 + (i%9)*0.010})`;
        ctx.beginPath();
        for(let x=0;x<c.width;x+=10){
          const yy = y + Math.sin((x*freq) + seed + i*0.17) * amp;
          if(x===0) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
        }
        ctx.stroke();
      }

      // vignette
      const v = ctx.createRadialGradient(c.width/2,c.height/2,130,c.width/2,c.height/2,520);
      v.addColorStop(0, "rgba(0,0,0,0)");
      v.addColorStop(1, "rgba(0,0,0,0.68)");
      ctx.fillStyle = v;
      ctx.fillRect(0,0,c.width,c.height);

      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      return tex;
    }

    function makeMoonTexture(seed=2.2, hue=200){
      // Moons: cleaner "striped scanlines + dots" so they don't match planets
      const c = document.createElement("canvas");
      c.width = 1024; c.height = 512;
      const ctx = c.getContext("2d");

      ctx.fillStyle = "rgb(7,10,16)";
      ctx.fillRect(0,0,c.width,c.height);

      // scanlines
      for(let i=0;i<220;i++){
        const y = (i/220)*c.height;
        const a = 0.010 + (i%7)*0.004;
        ctx.fillStyle = `hsla(${hue}, 95%, 65%, ${a})`;
        ctx.fillRect(0,y,c.width,1);
      }

      // dots grid
      for(let i=0;i<1300;i++){
        const x = Math.random()*c.width;
        const y = Math.random()*c.height;
        const r = 0.8 + Math.random()*1.8;
        ctx.fillStyle = `hsla(${hue+25}, 95%, 65%, ${0.03 + Math.random()*0.12})`;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }

      // diagonal sweep
      const grad = ctx.createLinearGradient(0,0,c.width,c.height);
      grad.addColorStop(0, `hsla(${hue-20}, 95%, 65%, 0.06)`);
      grad.addColorStop(0.5, `hsla(${hue+30}, 95%, 65%, 0.03)`);
      grad.addColorStop(1, `hsla(${hue-10}, 95%, 65%, 0.05)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,c.width,c.height);

      // vignette
      const v = ctx.createRadialGradient(c.width/2,c.height/2,120,c.width/2,c.height/2,520);
      v.addColorStop(0, "rgba(0,0,0,0)");
      v.addColorStop(1, "rgba(0,0,0,0.72)");
      ctx.fillStyle = v;
      ctx.fillRect(0,0,c.width,c.height);

      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      return tex;
    }

    function makeLabel(text, kind="moon"){
      const div = document.createElement("div");
      div.className = "label" + (kind==="planet" ? " section" : "");
      div.textContent = text;
      return new CSS2DObject(div);
    }

    // =========================
    // Build planets + moons
    // =========================
    const system = new THREE.Group();
    scene.add(system);

    // Hologram ring around selected body
    const holo = new THREE.Group();
    scene.add(holo);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0x7cffb2, transparent:true, opacity:0.10, side: THREE.DoubleSide, depthWrite:false
    });
    const ring = new THREE.Mesh(new THREE.RingGeometry(1, 1.08, 180), ringMat);
    ring.rotation.x = Math.PI/2;
    ring.visible = false;
    holo.add(ring);

    const ring2Mat = new THREE.MeshBasicMaterial({
      color: 0x6ea8ff, transparent:true, opacity:0.06, side: THREE.DoubleSide, depthWrite:false
    });
    const ring2 = new THREE.Mesh(new THREE.RingGeometry(1.12, 1.18, 180), ring2Mat);
    ring2.rotation.x = Math.PI/2;
    ring2.visible = false;
    holo.add(ring2);

    const objects = []; // clickable meshes
    const planets = [];

    SOLAR.forEach((p, i)=>{
      const planetGroup = new THREE.Group();
      planetGroup.rotation.z = p.incline || 0;
      system.add(planetGroup);

      const pTex = makePlanetTexture(1.1 + i*0.77, p.hue);
      const pMat = new THREE.MeshStandardMaterial({
        map: pTex,
        roughness: 0.24,
        metalness: 0.34,
        emissive: new THREE.Color().setHSL((p.hue%360)/360, 0.95, 0.10),
        emissiveIntensity: 1.10
      });

      const planetMesh = new THREE.Mesh(new THREE.SphereGeometry(p.size, 64, 64), pMat);
      planetMesh.userData = { type:"planet", planetId: p.id };
      planetGroup.add(planetMesh);
      objects.push(planetMesh);

      const atmo = new THREE.Mesh(
        new THREE.SphereGeometry(p.size*1.12, 64, 64),
        new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL((p.hue%360)/360, 0.95, 0.62),
          transparent:true, opacity:0.08, depthWrite:false
        })
      );
      planetGroup.add(atmo);

      const lbl = makeLabel(p.label, "planet");
      lbl.position.set(0, p.size + 1.2, 0);
      planetGroup.add(lbl);

      // orbit ring (visual) - larger + faint
      const orbitVis = new THREE.Mesh(
        new THREE.RingGeometry(p.orbitR - 0.10, p.orbitR + 0.10, 220),
        new THREE.MeshBasicMaterial({
          color: 0x7cffb2, transparent:true, opacity:0.035, side: THREE.DoubleSide, depthWrite:false
        })
      );
      orbitVis.rotation.x = Math.PI/2;
      scene.add(orbitVis);

      // moons
      const moonObjs = [];
      p.moons.forEach((m, mi)=>{
        const mg = new THREE.Group();
        planetGroup.add(mg);

        const mTex = makeMoonTexture(2.1 + i*1.1 + mi*0.9, m.hue);
        const mMat = new THREE.MeshStandardMaterial({
          map: mTex,
          roughness: 0.16,
          metalness: 0.22,
          emissive: new THREE.Color().setHSL((m.hue%360)/360, 0.95, 0.12),
          emissiveIntensity: 1.25
        });

        const moonMesh = new THREE.Mesh(new THREE.SphereGeometry(m.size, 48, 48), mMat);
        moonMesh.userData = { type:"moon", planetId: p.id, moonId: m.id, url: m.url };
        mg.add(moonMesh);
        objects.push(moonMesh);

        const mlbl = makeLabel(m.label, "moon");
        mlbl.position.set(0, m.size + 0.7, 0);
        mg.add(mlbl);

        moonObjs.push({ def:m, group: mg, mesh: moonMesh, t: m.phase || (mi * Math.PI*2/Math.max(1,p.moons.length)) });
      });

      planets.push({
        def: p,
        group: planetGroup,
        mesh: planetMesh,
        pTex,
        t: Math.random()*Math.PI*2,
        moons: moonObjs
      });
    });

    // =========================
    // Picking
    // =========================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hovering = null;

    // Focus state: camera follows selected object while it moves
    let focus = {
      mode: "home",          // "home" | "planet" | "moon"
      planetId: null,
      moonId: null,
      targetObj: null,       // THREE.Object3D
      distance: 16,
      height: 5,
      side: 4
    };

    let isAnimating = false;

    function easeInOut(t){ return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

    function findPlanet(planetId){
      return planets.find(p => p.def.id === planetId) || null;
    }
    function findMoon(planetId, moonId){
      const p = findPlanet(planetId);
      if(!p) return null;
      return p.moons.find(m => m.def.id === moonId) || null;
    }

    function setPanelForPlanet(pDef){
      panel.classList.add("on");
      panelTitle.textContent = pDef.label;
      panelDesc.textContent = pDef.desc;

      moonGrid.innerHTML = "";
      if(!pDef.moons.length){
        const div = document.createElement("div");
        div.className = "moonCard";
        div.style.cursor = "default";
        div.innerHTML = `<p class="moonName">No moons yet</p><p class="moonMeta">Add /games/&lt;name&gt;/index.html later, then plug it into SOLAR.</p>`;
        moonGrid.appendChild(div);
        return;
      }

      pDef.moons.forEach(m=>{
        const card = document.createElement("div");
        card.className = "moonCard";
        card.innerHTML = `<p class="moonName">${m.label}</p><p class="moonMeta">${m.desc}</p>`;
        card.addEventListener("click", ()=> focusMoonAndWarp(pDef.id, m.id, m.url));
        moonGrid.appendChild(card);
      });
    }

    function clearPanel(){
      panel.classList.remove("on");
      moonGrid.innerHTML = "";
    }

    galaxyBtn.addEventListener("click", ()=>{
      clearPanel();
      setFocusHomeSmooth();
    });

    function setHolo(targetWorldPos, radius){
      holo.position.copy(targetWorldPos);
      ring.scale.setScalar(radius);
      ring2.scale.setScalar(radius);
      ring.visible = true;
      ring2.visible = true;
    }
    function hideHolo(){
      ring.visible = false;
      ring2.visible = false;
    }

    function setFocusHomeSmooth(){
      isAnimating = true;
      focus.mode = "home";
      focus.planetId = null;
      focus.moonId = null;
      focus.targetObj = null;

      hideHolo();

      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();
      const t0 = performance.now();
      const dur = 820;

      function step(now){
        const t = Math.min((now - t0)/dur, 1);
        const e = easeInOut(t);
        camera.position.lerpVectors(startPos, homeCamPos, e);
        controls.target.lerpVectors(startTarget, homeTarget, e);
        controls.update();
        if(t < 1) requestAnimationFrame(step);
        else isAnimating = false;
      }
      requestAnimationFrame(step);
    }

    function focusPlanet(planetId){
      const p = findPlanet(planetId);
      if(!p) return;

      isAnimating = true;
      focus.mode = "planet";
      focus.planetId = planetId;
      focus.moonId = null;
      focus.targetObj = p.mesh;

      // desired follow camera params (planet)
      focus.distance = Math.max(20, p.def.size * 10);
      focus.height = 7 + p.def.size * 0.9;
      focus.side = 6 + p.def.size * 0.7;

      // animate to current planet position
      const wp = new THREE.Vector3();
      p.mesh.getWorldPosition(wp);

      const dir = wp.clone().normalize();
      const side = new THREE.Vector3(0,1,0).cross(dir).normalize();

      const destPos = wp.clone()
        .addScaledVector(dir, focus.distance)
        .addScaledVector(new THREE.Vector3(0,1,0), focus.height)
        .addScaledVector(side, focus.side);

      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();
      const t0 = performance.now();
      const dur = 720;

      playWhoosh();

      function step(now){
        const t = Math.min((now - t0)/dur, 1);
        const e = easeInOut(t);
        camera.position.lerpVectors(startPos, destPos, e);
        controls.target.lerpVectors(startTarget, homeTarget, e); // keep aiming at sun
        controls.update();
        if(t < 1) requestAnimationFrame(step);
        else {
          isAnimating = false;
          setPanelForPlanet(p.def);

          // show holo ring around planet
          const ppos = new THREE.Vector3();
          p.mesh.getWorldPosition(ppos);
          setHolo(ppos, p.def.size*2.2);
        }
      }
      requestAnimationFrame(step);
    }

    function focusMoonAndWarp(planetId, moonId, url){
      const m = findMoon(planetId, moonId);
      if(!m) return;

      isAnimating = true;
      focus.mode = "moon";
      focus.planetId = planetId;
      focus.moonId = moonId;
      focus.targetObj = m.mesh;

      // follow params (moon)
      focus.distance = 10.5;
      focus.height = 4.2;
      focus.side = 3.8;

      // animate to the moon's *current* world position
      const wp = new THREE.Vector3();
      m.mesh.getWorldPosition(wp);

      const centerDir = wp.clone().normalize();
      const side = new THREE.Vector3(0,1,0).cross(centerDir).normalize();

      const destPos = wp.clone()
        .addScaledVector(centerDir, focus.distance)
        .addScaledVector(new THREE.Vector3(0,1,0), focus.height)
        .addScaledVector(side, focus.side);

      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();
      const t0 = performance.now();
      const dur = 640;

      playWhoosh();

      function step(now){
        const t = Math.min((now - t0)/dur, 1);
        const e = easeInOut(t);
        camera.position.lerpVectors(startPos, destPos, e);
        controls.target.lerpVectors(startTarget, homeTarget, e); // still aim at sun so we don't clip
        controls.update();
        if(t < 1) requestAnimationFrame(step);
        else {
          // small holo ring around moon, then warp
          const mpos = new THREE.Vector3();
          m.mesh.getWorldPosition(mpos);
          setHolo(mpos, 1.8);
          fade.classList.add("on");
          setTimeout(()=> { location.href = url; }, 380);
        }
      }
      requestAnimationFrame(step);
    }

    // =========================
    // Pointer handlers
    // =========================
    addEventListener("pointerdown", ()=>{
      initAudio();
      // fade hum in
      if(humGain && ctx){
        const now = ctx.currentTime;
        humGain.gain.cancelScheduledValues(now);
        humGain.gain.setValueAtTime(humGain.gain.value, now);
        humGain.gain.exponentialRampToValueAtTime(0.03, now+0.25);
      }
    }, { once:false });

    addEventListener("pointermove", (ev)=>{
      if(isAnimating) return;
      mouse.x = (ev.clientX/innerWidth)*2 - 1;
      mouse.y = -(ev.clientY/innerHeight)*2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(objects, false);
      if(hits.length){
        hovering = hits[0].object;
        document.body.style.cursor = "pointer";
      }else{
        hovering = null;
        document.body.style.cursor = "default";
      }
    });

    addEventListener("click", ()=>{
      initAudio();
      if(isAnimating || !hovering) return;

      const data = hovering.userData || {};
      if(data.type === "planet"){
        clearPanel();
        focusPlanet(data.planetId);
      } else if(data.type === "moon"){
        clearPanel();
        // clicking moon directly should warp
        focusMoonAndWarp(data.planetId, data.moonId, data.url);
      }
    });

    addEventListener("keydown",(e)=>{
      if(e.key === "Escape"){
        clearPanel();
        setFocusHomeSmooth();
      }
    });

    // =========================
    // "Follow while moving"
    // =========================
    function applyFollow(dt){
      if(isAnimating) return;

      if(focus.mode === "home"){
        // keep default orbit target
        return;
      }

      const obj = focus.targetObj;
      if(!obj) return;

      const wp = new THREE.Vector3();
      obj.getWorldPosition(wp);

      // Always anchor camera to keep looking toward the sun (center planet),
      // so we don't clip through the sun.
      controls.target.copy(homeTarget);

      // Compute camera position relative to selected object BUT offset based on its radial direction
      const radial = wp.clone().normalize();
      const side = new THREE.Vector3(0,1,0).cross(radial).normalize();

      const desired = wp.clone()
        .addScaledVector(radial, focus.distance)
        .addScaledVector(new THREE.Vector3(0,1,0), focus.height)
        .addScaledVector(side, focus.side);

      // Smooth follow (no teleport)
      const k = 1 - Math.pow(0.0005, dt); // frame-rate independent smoothing
      camera.position.lerp(desired, Math.min(1, k*2.2));

      // Update holo ring position too
      setHolo(wp, focus.mode==="planet" ? (findPlanet(focus.planetId)?.def.size || 2)*2.2 : 1.8);
    }

    // =========================
    // Animate system
    // =========================
    let last = performance.now();
    function animate(now){
      const dt = Math.min((now-last)/1000, 0.05);
      last = now;

      starsNear.rotation.y += dt * 0.004;
      starsFar.rotation.y  -= dt * 0.002;

      sun.rotation.y += dt * 0.10;
      sunWire.rotation.y += dt * 0.065;
      sunGlow.material.opacity = 0.055 + Math.sin(now*0.0012)*0.010;

      floor.material.opacity = 0.045 + Math.sin(now*0.0013)*0.010;

      // move planets + moons
      planets.forEach((p, i)=>{
        p.t += dt * p.def.orbitSpeed;

        // slight vertical drift
        const rr = p.def.orbitR + Math.sin(now*0.0009 + i)*0.45;
        const y = -1.2 + Math.sin(now*0.0011 + i)*0.55;

        p.group.position.set(Math.cos(p.t)*rr, y, Math.sin(p.t)*rr);

        // texture drift
        p.pTex.offset.x += dt * (0.0016 + i*0.0006);
        p.pTex.offset.y += dt * (0.0011 + i*0.0005);

        // moons orbit around their planet
        p.moons.forEach((m, mi)=>{
          m.t += dt * m.def.speed;
          const mr = m.def.r;
          const my = Math.sin(now*0.0015 + mi)*0.45;
          m.group.position.set(Math.cos(m.t)*mr, my, Math.sin(m.t)*mr);
        });
      });

      // holo ring animation
      if(ring.visible){
        ring.rotation.z += dt * 0.35;
        ring2.rotation.z -= dt * 0.22;
        ringMat.opacity = 0.08 + Math.sin(now*0.002)*0.02;
        ring2Mat.opacity = 0.05 + Math.sin(now*0.0016+1.2)*0.015;
      }

      applyFollow(dt);

      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    // home on first load
    hideHolo();

    addEventListener("resize", ()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
