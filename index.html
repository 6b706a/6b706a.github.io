<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>kvorr // 3D</title>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; background:#05070c; }
    canvas { display:block; }

    .hud{
      position:fixed; left:14px; top:14px; right:14px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      color: rgba(220,240,255,.92);
      pointer-events:none;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-start;
      justify-content:space-between;
    }
    .box{
      pointer-events:auto;
      background: rgba(0,0,0,.40);
      border: 1px solid rgba(140,255,200,.20);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 70px rgba(0,0,0,.55);
      max-width: min(680px, calc(100vw - 28px));
      line-height: 1.45;
      font-size: 12px;
    }
    .title{ color: rgba(140,255,200,.95); font-weight:700; letter-spacing:.6px; text-transform:uppercase; font-size:12px; }
    .err{ color:#ff6b86; margin-top:6px; white-space: pre-wrap; }
    .ok{ color:#7cffb2; margin-top:6px; white-space: pre-wrap; }
    .small{ color: rgba(200,220,255,.75); }
    a{ color:#7cffb2; text-decoration:none; }
    a:hover{ text-decoration:underline; }
    .kbd{ padding:2px 6px; border:1px solid rgba(110,168,255,.25); border-radius:8px; background:rgba(10,16,28,.45); }
  </style>
</head>
<body>
  <div class="hud">
    <div class="box">
      <div class="title">kvorr // 3D portfolio</div>
      <div class="small">
        drag = orbit · scroll = zoom · click nodes = open (will 404 until you add games)
        · hold <span class="kbd">Shift</span> = slow orbit
      </div>
      <div id="status" class="ok">loading…</div>
      <div id="err" class="err"></div>
    </div>

    <div class="box">
      <div class="title">links</div>
      <div class="small">
        <a href="https://github.com/6b706a" target="_blank" rel="noreferrer">github</a>
        · <a href="#" id="reset">reset view</a>
      </div>
    </div>
  </div>

  <!-- Load THREE first -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

  <script>
    // Robustly load OrbitControls and then start.
    (function () {
      const statusEl = document.getElementById("status");
      const errEl = document.getElementById("err");

      function ok(msg){ statusEl.textContent = msg; }
      function fail(msg){ errEl.textContent = msg; }

      // Quick sanity
      if (!window.THREE) {
        fail("Three.js failed to load. CDN blocked or script failed.\nTry a different network or disable aggressive ad/script blockers.");
        return;
      }

      // OrbitControls loader: tries multiple known CDN paths/versions.
      const orbitCandidates = [
        "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js",
        "https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js",
        "https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js",
        "https://unpkg.com/three@0.152.2/examples/js/controls/OrbitControls.js"
      ];

      function loadScript(url){
        return new Promise((resolve,reject)=>{
          const s = document.createElement("script");
          s.src = url;
          s.onload = () => resolve(url);
          s.onerror = () => reject(url);
          document.head.appendChild(s);
        });
      }

      async function ensureOrbitControls(){
        // In some builds OrbitControls attaches to window.OrbitControls
        if (window.OrbitControls) return "already";
        for (const url of orbitCandidates){
          try{
            ok("loading controls…");
            await loadScript(url);
            if (window.OrbitControls) return url;
          }catch(_){}
        }
        throw new Error("OrbitControls failed to load from all CDNs.");
      }

      function start3D(){
        // Basic WebGL check
        try{
          const test = document.createElement("canvas");
          const gl = test.getContext("webgl") || test.getContext("experimental-webgl");
          if(!gl){
            fail("WebGL is unavailable in this browser/device.\nEnable hardware acceleration or update graphics drivers.");
            return;
          }
        }catch(e){
          fail("WebGL check failed: " + String(e));
          return;
        }

        ok("running ✅ (if you still see nothing, scroll/drag—camera might be far)");

        // ===== Scene =====
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x05070c, 0.03);

        const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 2000);
        camera.position.set(0, 4.2, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0x88aaff, 0.55));
        const key = new THREE.DirectionalLight(0x7cffb2, 1.0);
        key.position.set(6, 10, 6);
        scene.add(key);
        const rim = new THREE.DirectionalLight(0x6ea8ff, 0.7);
        rim.position.set(-10, 2, -6);
        scene.add(rim);

        // Stars (cheap and obvious)
        (function addStars(){
          const count = 1800;
          const geo = new THREE.BufferGeometry();
          const pos = new Float32Array(count*3);
          for(let i=0;i<count;i++){
            const r = 120 + Math.random()*420;
            const theta = Math.random()*Math.PI*2;
            const u = Math.random()*2 - 1;
            const phi = Math.acos(u);
            pos[i*3+0] = r*Math.sin(phi)*Math.cos(theta);
            pos[i*3+1] = r*Math.cos(phi);
            pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
          }
          geo.setAttribute("position", new THREE.BufferAttribute(pos,3));
          const mat = new THREE.PointsMaterial({ size: 0.9, transparent:true, opacity:0.9 });
          scene.add(new THREE.Points(geo, mat));
        })();

        // Planet group
        const planetGroup = new THREE.Group();
        scene.add(planetGroup);

        const geo = new THREE.IcosahedronGeometry(2.6, 3);

        const planet = new THREE.Mesh(
          geo,
          new THREE.MeshStandardMaterial({
            color: 0x0b1220,
            emissive: 0x08101c,
            emissiveIntensity: 1.1,
            roughness: 0.35,
            metalness: 0.3
          })
        );
        planetGroup.add(planet);

        const wire = new THREE.Mesh(
          geo,
          new THREE.MeshBasicMaterial({
            color: 0x7cffb2,
            wireframe: true,
            transparent: true,
            opacity: 0.25
          })
        );
        planetGroup.add(wire);

        const glow = new THREE.Mesh(
          new THREE.SphereGeometry(2.95, 32, 32),
          new THREE.MeshBasicMaterial({ color: 0x6ea8ff, transparent:true, opacity: 0.10 })
        );
        planetGroup.add(glow);

        // Orbit ring
        const radius = 6.2;
        const orbit = new THREE.Mesh(
          new THREE.RingGeometry(radius - 0.02, radius + 0.02, 180),
          new THREE.MeshBasicMaterial({
            color: 0x7cffb2,
            transparent: true,
            opacity: 0.12,
            side: THREE.DoubleSide
          })
        );
        orbit.rotation.x = Math.PI/2;
        scene.add(orbit);

        // Nodes
        const projects = [
          { name: "Slot 01", url: "/games/slot01/" },
          { name: "Claw", url: "/games/claw/" },
          { name: "Cipher Lab", url: "/tools/cipherlab/" },
          { name: "Microgame", url: "/games/microgame/" }
        ];

        const nodeGroup = new THREE.Group();
        scene.add(nodeGroup);

        const nodes = [];
        projects.forEach((p,i)=>{
          const g = new THREE.Group();

          const node = new THREE.Mesh(
            new THREE.SphereGeometry(0.32, 24, 24),
            new THREE.MeshStandardMaterial({
              color: 0x08101c,
              emissive: 0x7cffb2,
              emissiveIntensity: 1.8,
              roughness: 0.35,
              metalness: 0.25
            })
          );
          node.userData = p;
          g.add(node);

          const ring = new THREE.Mesh(
            new THREE.TorusGeometry(0.48, 0.04, 10, 40),
            new THREE.MeshBasicMaterial({ color: 0x6ea8ff, wireframe:true, transparent:true, opacity: 0.55 })
          );
          ring.rotation.x = Math.PI/2.4;
          g.add(ring);

          const t = (i/projects.length)*Math.PI*2;
          const y = (i-(projects.length-1)/2)*0.6;
          g.position.set(Math.cos(t)*radius, y, Math.sin(t)*radius);

          nodeGroup.add(g);
          nodes.push({ g, node, ring, t, y });
        });

        // Controls (OrbitControls is global after loading examples/js)
        const controls = new window.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 6.5;
        controls.maxDistance = 22;
        controls.target.set(0, 0, 0);

        document.getElementById("reset").addEventListener("click", (e)=>{
          e.preventDefault();
          camera.position.set(0, 4.2, 12);
          controls.target.set(0, 0, 0);
          controls.update();
        });

        // Picking
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hovered = null;

        addEventListener("pointermove",(ev)=>{
          mouse.x = (ev.clientX/innerWidth)*2 -1;
          mouse.y = -(ev.clientY/innerHeight)*2 +1;

          raycaster.setFromCamera(mouse, camera);
          const hits = raycaster.intersectObjects(nodes.map(n=>n.node), false);
          if(hits.length){
            const hit = hits[0].object;
            if(hovered !== hit){
              if(hovered) hovered.material.emissiveIntensity = 1.8;
              hovered = hit;
              hovered.material.emissiveIntensity = 2.6;
              document.body.style.cursor = "pointer";
            }
          } else {
            if(hovered) hovered.material.emissiveIntensity = 1.8;
            hovered = null;
            document.body.style.cursor = "default";
          }
        });

        addEventListener("click",()=>{
          if(!hovered) return;
          const p = hovered.userData;
          if(p && p.url) location.href = p.url; // will 404 until you add folders, that's fine
        });

        // Shift = slow orbit speed
        let slow = false;
        addEventListener("keydown",(e)=>{ if(e.key==="Shift") slow=true; });
        addEventListener("keyup",(e)=>{ if(e.key==="Shift") slow=false; });

        // Animate
        let last = performance.now();
        function animate(now){
          const dt = Math.min((now-last)/1000,0.05);
          last = now;

          planetGroup.rotation.y += dt*0.40;
          wire.rotation.y += dt*0.25;
          planetGroup.rotation.x = Math.sin(now*0.00035)*0.08;

          nodes.forEach((n,i)=>{
            n.t += dt*((slow ? 0.12 : 0.34) + i*0.03);
            const r = radius + Math.sin(now*0.001 + i)*0.12;
            n.g.position.x = Math.cos(n.t)*r;
            n.g.position.z = Math.sin(n.t)*r;
            n.g.position.y = n.y + Math.sin(now*0.0012 + i)*0.10;
            n.ring.rotation.z += dt*0.6;
          });

          controls.update();
          renderer.render(scene,camera);
          requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        addEventListener("resize",()=>{
          camera.aspect = innerWidth/innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(innerWidth,innerHeight);
        });
      }

      (async function main(){
        try{
          const src = await ensureOrbitControls();
          ok("controls loaded ✅ (" + (src === "already" ? "cached" : "cdn") + ")");
          start3D();
        }catch(e){
          fail(String(e) + "\n\nTry disabling ad blockers or switching networks.\nAlso try opening DevTools → Console to see blocked requests.");
        }
      })();
    })();
  </script>
</body>
</html>
