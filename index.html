<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>orbit</title>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; background:#05070c; }
    canvas { display:block; }

    /* Minimal popup only */
    .popupWrap{
      position:fixed; inset:0; z-index:10;
      pointer-events:none;
      display:grid;
      place-items:end center;
      padding: 18px;
    }
    .popup{
      pointer-events:auto;
      display:none;
      width:min(520px, calc(100vw - 36px));
      border-radius: 18px;
      border:1px solid rgba(124,255,178,.18);
      background: rgba(6,10,18,.70);
      backdrop-filter: blur(10px);
      box-shadow: 0 26px 90px rgba(0,0,0,.62);
      padding: 14px 14px 12px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      color: rgba(230,245,255,.92);
    }
    .popup.on{ display:block; }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 10px;
    }
    .title{
      font-size: 14px;
      letter-spacing: .4px;
      margin:0;
    }
    .tag{
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(110,168,255,.22);
      background: rgba(110,168,255,.08);
      color: rgba(230,241,255,.9);
      white-space:nowrap;
      height: fit-content;
    }
    .desc{
      margin:0 0 12px;
      font-size: 12px;
      color: rgba(200,220,255,.72);
      line-height: 1.5;
    }
    .row{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .btn{
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(110,168,255,.20);
      background: rgba(10,16,28,.45);
      color: rgba(230,245,255,.9);
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease, opacity .12s ease;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(124,255,178,.38); background: rgba(10,16,28,.62); }
    .btn.primary{
      border-color: rgba(124,255,178,.26);
      background: rgba(124,255,178,.10);
    }
    .btn.primary:hover{
      border-color: rgba(124,255,178,.40);
      background: rgba(124,255,178,.14);
    }
    .btn.muted{
      opacity: .55;
      cursor:not-allowed;
    }

    .fade{
      position:fixed; inset:0; z-index: 9; pointer-events:none;
      background: radial-gradient(900px 700px at 50% 50%, rgba(124,255,178,.14), rgba(0,0,0,.92));
      opacity: 0;
      transition: opacity .35s ease;
    }
    .fade.on{ opacity: 1; }

    /* Coming soon modal (still minimal) */
    .modal{
      position:fixed; inset:0; z-index: 20;
      display:none;
      place-items:center;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
      padding: 18px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      color: rgba(230,245,255,.92);
    }
    .modal.on{ display:grid; }
    .card{
      width:min(720px, 100%);
      border-radius: 22px;
      border:1px solid rgba(124,255,178,.18);
      background: rgba(6,10,18,.78);
      box-shadow: 0 30px 110px rgba(0,0,0,.65);
      padding: 18px 18px 14px;
    }
    .card h3{ margin:0 0 6px; font-size:18px; }
    .card p{ margin:0 0 12px; color: rgba(200,220,255,.72); line-height:1.55; font-size:13px; }
    code{ color: rgba(124,255,178,.95); }
  </style>
</head>
<body>
  <div class="fade" id="fade"></div>

  <div class="modal" id="soon">
    <div class="card">
      <h3>Coming soon</h3>
      <p>
        This page doesn’t exist yet: <code id="soonPath"></code><br/>
        Add it to your repo and Launch will work instantly.
      </p>
      <div class="row">
        <button class="btn" id="soonClose">back</button>
      </div>
    </div>
  </div>

  <div class="popupWrap">
    <div class="popup" id="popup">
      <div class="top">
        <h2 class="title" id="popTitle">Cipher Lab</h2>
        <div class="tag" id="popTag">tools</div>
      </div>
      <p class="desc" id="popDesc">Warp into a page for ciphers + cipher tools.</p>
      <div class="row">
        <button class="btn" id="backBtn">back</button>
        <button class="btn primary" id="launchBtn">launch</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.160.0";
    import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // ===== Target page for cipher tools =====
    // Change this if you want a different route later.
    const CIPHER_TOOLS_URL = "/tools/cipherlab/index.html";

    // ===== DOM =====
    const fade = document.getElementById("fade");
    const popup = document.getElementById("popup");
    const backBtn = document.getElementById("backBtn");
    const launchBtn = document.getElementById("launchBtn");

    const soon = document.getElementById("soon");
    const soonPath = document.getElementById("soonPath");
    const soonClose = document.getElementById("soonClose");
    soonClose.addEventListener("click", ()=> soon.classList.remove("on"));
    addEventListener("keydown", (e)=>{ if(e.key === "Escape") { soon.classList.remove("on"); exitFocus(); } });

    // ===== Scene / Renderer =====
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x05070c, 0.020);

    const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 3000);
    camera.position.set(0, 2.0, 40);

    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x05070c, 1);
    document.body.appendChild(renderer.domElement);

    // Infinite backdrop (no walls)
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(900, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x05070c, side: THREE.BackSide })
    ));

    function addStars(count, size, rMin, rMax, opacity){
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(count*3);
      for(let i=0;i<count;i++){
        const r = rMin + Math.random()*(rMax-rMin);
        const theta = Math.random()*Math.PI*2;
        const u = Math.random()*2 - 1;
        const phi = Math.acos(u);
        pos[i*3+0] = r*Math.sin(phi)*Math.cos(theta);
        pos[i*3+1] = r*Math.cos(phi);
        pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
      }
      geo.setAttribute("position", new THREE.BufferAttribute(pos,3));
      const mat = new THREE.PointsMaterial({ size, transparent:true, opacity, depthWrite:false });
      const pts = new THREE.Points(geo, mat);
      scene.add(pts);
      return pts;
    }
    const starsNear = addStars(1400, 1.0, 120, 320, 0.75);
    const starsFar  = addStars(2200, 1.3, 260, 820, 0.55);

    // Lights
    scene.add(new THREE.AmbientLight(0x88aaff, 0.45));
    const key = new THREE.DirectionalLight(0x7cffb2, 1.05);
    key.position.set(6,10,6);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x6ea8ff, 0.75);
    rim.position.set(-10,2,-6);
    scene.add(rim);

    // Subtle floor grid (optional vibe; no walls)
    const floor = new THREE.GridHelper(220, 220, 0x7cffb2, 0x1f3b33);
    floor.material.transparent = true;
    floor.material.opacity = 0.10;
    floor.position.y = -2.8;
    scene.add(floor);

    // ===== Core planet =====
    const core = new THREE.Group();
    scene.add(core);

    const coreGeo = new THREE.IcosahedronGeometry(2.85, 5);
    const coreMat = new THREE.MeshStandardMaterial({
      color: 0x07101b,
      roughness: 0.22,
      metalness: 0.58,
      emissive: 0x08101c,
      emissiveIntensity: 0.95
    });
    const coreMesh = new THREE.Mesh(coreGeo, coreMat);
    core.add(coreMesh);

    const coreWire = new THREE.Mesh(coreGeo, new THREE.MeshBasicMaterial({
      color:0x7cffb2, wireframe:true, transparent:true, opacity:0.12
    }));
    core.add(coreWire);

    const coreGlow = new THREE.Mesh(
      new THREE.SphereGeometry(3.65, 48, 48),
      new THREE.MeshBasicMaterial({ color:0x6ea8ff, transparent:true, opacity:0.08, depthWrite:false })
    );
    core.add(coreGlow);

    const coreGlow2 = new THREE.Mesh(
      new THREE.SphereGeometry(4.20, 48, 48),
      new THREE.MeshBasicMaterial({ color:0x7cffb2, transparent:true, opacity:0.035, depthWrite:false })
    );
    core.add(coreGlow2);

    // ===== Single orbiting planet (TRON style) =====
    // Uses a clean “circuit” texture + atmosphere glow.
    function makeTronTexture(seed=1.2){
      const c = document.createElement("canvas");
      c.width = 1024; c.height = 512;
      const ctx = c.getContext("2d");

      ctx.fillStyle = "rgb(6,10,18)";
      ctx.fillRect(0,0,c.width,c.height);

      // glow bands
      const grad = ctx.createLinearGradient(0,0,c.width,c.height);
      grad.addColorStop(0, "rgba(124,255,178,0.10)");
      grad.addColorStop(0.5, "rgba(110,168,255,0.08)");
      grad.addColorStop(1, "rgba(255,77,109,0.06)");
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,c.width,c.height);

      // circuits (clean lines)
      ctx.lineWidth = 2;
      for(let i=0;i<180;i++){
        const y = (i/180) * c.height;
        const amp = 14 + (i%9)*3;
        const freq = 0.008 + (i%7)*0.001;
        ctx.strokeStyle = `rgba(124,255,178,${0.02 + (i%7)*0.01})`;
        ctx.beginPath();
        for(let x=0;x<c.width;x+=10){
          const yy = y + Math.sin((x*freq) + seed + i*0.15) * amp;
          if(x===0) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
        }
        ctx.stroke();
      }

      // “nodes”
      for(let i=0;i<600;i++){
        const x = Math.random()*c.width;
        const y = Math.random()*c.height;
        const r = 1 + Math.random()*2.2;
        ctx.fillStyle = `rgba(110,168,255,${0.03 + Math.random()*0.08})`;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }

      // vignette
      const v = ctx.createRadialGradient(c.width/2,c.height/2,120,c.width/2,c.height/2,420);
      v.addColorStop(0, "rgba(0,0,0,0)");
      v.addColorStop(1, "rgba(0,0,0,0.62)");
      ctx.fillStyle = v;
      ctx.fillRect(0,0,c.width,c.height);

      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      return tex;
    }

    const moonGroup = new THREE.Group();
    scene.add(moonGroup);

    const moonSize = 1.35;
    const moonTex = makeTronTexture(1.1);
    const moonMat = new THREE.MeshStandardMaterial({
      map: moonTex,
      color: 0xffffff,
      roughness: 0.25,
      metalness: 0.35,
      emissive: new THREE.Color().setHSL(0.43, 0.95, 0.10), // teal-ish
      emissiveIntensity: 1.15
    });
    const moon = new THREE.Mesh(new THREE.SphereGeometry(moonSize, 64, 64), moonMat);
    moon.userData = { name:"Cipher Lab", tag:"tools", desc:"Warp into ciphers + cipher tools.", url: CIPHER_TOOLS_URL };
    moonGroup.add(moon);

    const atmo = new THREE.Mesh(
      new THREE.SphereGeometry(moonSize*1.10, 64, 64),
      new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(0.43, 0.95, 0.55),
        transparent:true,
        opacity: 0.12,
        depthWrite:false
      })
    );
    moonGroup.add(atmo);

    // subtle ring for tron vibe
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(moonSize*1.35, moonSize*1.65, 180),
      new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(0.55, 0.85, 0.55),
        transparent:true,
        opacity: 0.06,
        side: THREE.DoubleSide,
        depthWrite:false
      })
    );
    ring.rotation.x = Math.PI/2.25;
    ring.rotation.y = 0.6;
    moonGroup.add(ring);

    // ===== Controls =====
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 6.5;
    controls.maxDistance = 30;
    controls.target.set(0, -0.4, 0);

    // ===== Intro warp (LOCK input) =====
    const warpGroup = new THREE.Group();
    scene.add(warpGroup);

    const warpLen = 190, warpRadius = 10.5, warpCount = 3400;
    const warpGeo = new THREE.BufferGeometry();
    const warpPos = new Float32Array(warpCount*3);
    const warpCol = new Float32Array(warpCount*3);

    for(let i=0;i<warpCount;i++){
      const z = -Math.random()*warpLen;
      const a = Math.random()*Math.PI*2;
      const r = warpRadius * (0.35 + Math.random()*0.65);
      warpPos[i*3+0] = Math.cos(a)*r;
      warpPos[i*3+1] = Math.sin(a)*r;
      warpPos[i*3+2] = z;

      const g = 0.6 + Math.random()*0.4;
      const b = 0.55 + Math.random()*0.45;
      warpCol[i*3+0] = 0.22;
      warpCol[i*3+1] = g;
      warpCol[i*3+2] = b;
    }
    warpGeo.setAttribute("position", new THREE.BufferAttribute(warpPos,3));
    warpGeo.setAttribute("color", new THREE.BufferAttribute(warpCol,3));

    const warpMat = new THREE.PointsMaterial({
      size: 0.10,
      vertexColors: true,
      transparent: true,
      opacity: 0.0,
      depthWrite: false
    });
    const warpPts = new THREE.Points(warpGeo, warpMat);
    warpGroup.add(warpPts);

    function easeOutCubic(x){ return 1 - Math.pow(1-x, 3); }
    let intro = true;
    let introT = 0;

    // ===== Focus / follow behavior =====
    let focused = false;
    let focusOffset = new THREE.Vector3(0, 1.8, 6.8); // camera position relative to the focused planet
    const tmpPos = new THREE.Vector3();
    const tmpTarget = new THREE.Vector3();

    function enterFocus(){
      focused = true;
      popup.classList.add("on");
    }

    function exitFocus(){
      focused = false;
      popup.classList.remove("on");
      // restore controls target back toward center
      controls.target.set(0, -0.4, 0);
      controls.update();
    }

    backBtn.addEventListener("click", ()=> exitFocus());

    // ===== Click to focus =====
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hovering = false;

    addEventListener("pointermove", (ev)=>{
      if(intro) return;
      mouse.x = (ev.clientX/innerWidth)*2 - 1;
      mouse.y = -(ev.clientY/innerHeight)*2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(moon, false);

      if(hits.length){
        hovering = true;
        document.body.style.cursor = "pointer";
      } else {
        hovering = false;
        document.body.style.cursor = "default";
      }
    });

    addEventListener("click", ()=>{
      if(intro) return;
      if(!hovering) return;

      // animate into focus
      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();

      moon.getWorldPosition(tmpTarget);
      const endTarget = tmpTarget.clone();

      // end camera = focused target + offset rotated to face target
      // use current camera direction-ish by building offset in camera space toward target
      const dir = startPos.clone().sub(endTarget).normalize(); // from target to camera
      const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();
      const up = new THREE.Vector3(0,1,0);

      // build a pleasant offset: back + slightly up + slight side
      const endPos = endTarget.clone()
        .addScaledVector(dir, 6.8)
        .addScaledVector(up, 1.6)
        .addScaledVector(side, 1.2);

      const t0 = performance.now();
      function step(now){
        const t = Math.min((now - t0)/520, 1);
        const e = t<0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;

        camera.position.lerpVectors(startPos, endPos, e);
        controls.target.lerpVectors(startTarget, endTarget, e);
        controls.update();

        if(t < 1) requestAnimationFrame(step);
        else {
          enterFocus();

          // set follow offset based on achieved endPos relative to target
          focusOffset.copy(camera.position).sub(endTarget);
        }
      }
      requestAnimationFrame(step);
    });

    // ===== Launch behavior with existence check =====
    async function exists(url){
      try{
        const res = await fetch(url, { method:"HEAD", cache:"no-store" });
        return res.ok;
      }catch(_){
        return false;
      }
    }

    let warping = false;

    async function warpIntoMoon(){
      if(warping) return;
      warping = true;

      const url = moon.userData.url;
      const ok = await exists(url);

      // warp animation: fly into the planet
      fade.classList.add("on");

      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();

      moon.getWorldPosition(tmpTarget);
      const endTarget = tmpTarget.clone();

      const dirToMoon = endTarget.clone().sub(startPos).normalize();
      const endPos = endTarget.clone().addScaledVector(dirToMoon, -moonSize*0.20);

      const t0 = performance.now();
      function step(now){
        const t = Math.min((now - t0)/820, 1);
        const e = t<0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;

        camera.position.lerpVectors(startPos, endPos, e);
        controls.target.lerpVectors(startTarget, endTarget, e);
        controls.update();

        if(t < 1) requestAnimationFrame(step);
        else {
          if(ok){
            location.href = url;
          } else {
            soonPath.textContent = url;
            soon.classList.add("on");
            fade.classList.remove("on");
            warping = false;
          }
        }
      }
      requestAnimationFrame(step);
    }

    launchBtn.addEventListener("click", ()=> warpIntoMoon());

    // ===== Disable user movement during intro =====
    function lockControls(on){
      controls.enabled = !on;
      // also prevent wheel zoom feeling during intro
      renderer.domElement.style.pointerEvents = on ? "none" : "auto";
    }
    lockControls(true);

    // ===== Orbit parameters (single planet orbiting core) =====
    let tMoon = 0;
    const rMoon = 7.6;
    const yMoon = -0.3;

    // ===== Animate =====
    let last = performance.now();
    function animate(now){
      const dt = Math.min((now-last)/1000, 0.05);
      last = now;

      // Star drift
      starsNear.rotation.y += dt * 0.006;
      starsFar.rotation.y  -= dt * 0.003;

      // Core breathe
      core.rotation.y += dt * 0.18;
      coreWire.rotation.y += dt * 0.12;
      coreGlow.material.opacity  = 0.075 + Math.sin(now*0.0012)*0.008;
      coreGlow2.material.opacity = 0.032 + Math.sin(now*0.0010 + 1.3)*0.007;

      // Floor shimmer
      floor.material.opacity = 0.095 + Math.sin(now*0.0013)*0.018;

      // Moon orbit
      tMoon += dt * 0.28;
      const rr = rMoon + Math.sin(now*0.001)*0.08;

      moonGroup.position.x = Math.cos(tMoon) * rr;
      moonGroup.position.z = Math.sin(tMoon) * rr;
      moonGroup.position.y = yMoon + Math.sin(now*0.0011)*0.07;

      moon.rotation.y += dt * 0.22;
      moonTex.offset.x += dt * 0.004;
      moonTex.offset.y += dt * 0.002;

      // Focus-follow: keep camera anchored to the moving planet
      if(focused && !warping){
        moon.getWorldPosition(tmpTarget);
        controls.target.copy(tmpTarget);

        // keep camera at same offset relative to target
        camera.position.copy(tmpTarget).add(focusOffset);

        controls.update();
      }

      // Intro warp (locks controls + no input)
      if(intro){
        introT += dt;
        const t = Math.min(introT / 2.15, 1);
        const e = easeOutCubic(t);

        camera.position.z = 40 - e * 25.2;
        camera.position.y = 2.0 + (3.0 - 2.0) * e;
        controls.target.set(0, -0.4, 0);

        const vel = (1 - t) * (1 - t);
        const speed = 50 * vel;

        // fade out before stop
        const fadeOut = t < 0.75 ? (t / 0.75) : (1 - (t - 0.75) / 0.25);
        warpMat.opacity = Math.max(0, Math.min(0.95, fadeOut*0.95));

        if(speed > 0.05){
          const arr = warpGeo.attributes.position.array;
          for(let i=0;i<warpCount;i++){
            const z = arr[i*3+2] + dt * speed;
            arr[i*3+2] = (z > 6) ? (-warpLen + Math.random()*-10) : z;
          }
          warpGeo.attributes.position.needsUpdate = true;
        }

        if(t >= 1){
          intro = false;
          warpGroup.visible = false;
          camera.position.set(0, 3.0, 14.8);
          controls.target.set(0, -0.4, 0);
          lockControls(false);
        } else {
          warpGroup.visible = true;
        }
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    addEventListener("resize", ()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
