<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>orbit</title>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; background:#05070c; }
    canvas { display:block; }

    /* Minimal popup only */
    .popupWrap{
      position:fixed; inset:0; z-index:10;
      pointer-events:none;
      display:grid;
      place-items:end center;
      padding: 18px;
    }
    .popup{
      pointer-events:auto;
      display:none;
      width:min(560px, calc(100vw - 36px));
      border-radius: 18px;
      border:1px solid rgba(124,255,178,.18);
      background: rgba(6,10,18,.72);
      backdrop-filter: blur(10px);
      box-shadow: 0 26px 90px rgba(0,0,0,.62);
      padding: 14px 14px 12px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      color: rgba(230,245,255,.92);
    }
    .popup.on{ display:block; }
    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 10px;
    }
    .title{
      font-size: 14px;
      letter-spacing: .4px;
      margin:0;
    }
    .tag{
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(110,168,255,.22);
      background: rgba(110,168,255,.08);
      color: rgba(230,241,255,.9);
      white-space:nowrap;
      height: fit-content;
    }
    .desc{
      margin:0 0 12px;
      font-size: 12px;
      color: rgba(200,220,255,.72);
      line-height: 1.5;
    }
    .row{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .btn{
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(110,168,255,.20);
      background: rgba(10,16,28,.45);
      color: rgba(230,245,255,.9);
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease, opacity .12s ease;
    }
    .btn:hover{ transform: translateY(-1px); border-color: rgba(124,255,178,.38); background: rgba(10,16,28,.62); }
    .btn.primary{
      border-color: rgba(124,255,178,.26);
      background: rgba(124,255,178,.10);
    }
    .btn.primary:hover{
      border-color: rgba(124,255,178,.40);
      background: rgba(124,255,178,.14);
    }
    .fade{
      position:fixed; inset:0; z-index: 9; pointer-events:none;
      background: radial-gradient(900px 700px at 50% 50%, rgba(124,255,178,.12), rgba(0,0,0,.92));
      opacity: 0;
      transition: opacity .35s ease;
    }
    .fade.on{ opacity: 1; }

    /* Coming soon modal (still minimal) */
    .modal{
      position:fixed; inset:0; z-index: 20;
      display:none;
      place-items:center;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
      padding: 18px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      color: rgba(230,245,255,.92);
    }
    .modal.on{ display:grid; }
    .card{
      width:min(760px, 100%);
      border-radius: 22px;
      border:1px solid rgba(124,255,178,.18);
      background: rgba(6,10,18,.78);
      box-shadow: 0 30px 110px rgba(0,0,0,.65);
      padding: 18px 18px 14px;
    }
    .card h3{ margin:0 0 6px; font-size:18px; }
    .card p{ margin:0 0 12px; color: rgba(200,220,255,.72); line-height:1.55; font-size:13px; }
    code{ color: rgba(124,255,178,.95); }
  </style>
</head>
<body>
  <div class="fade" id="fade"></div>

  <div class="modal" id="soon">
    <div class="card">
      <h3>Coming soon</h3>
      <p>
        This page doesn’t exist yet: <code id="soonPath"></code><br/>
        Add it to your repo and Launch will work instantly.
      </p>
      <div class="row">
        <button class="btn" id="soonClose">back</button>
      </div>
    </div>
  </div>

  <div class="popupWrap">
    <div class="popup" id="popup">
      <div class="top">
        <h2 class="title" id="popTitle">—</h2>
        <div class="tag" id="popTag">—</div>
      </div>
      <p class="desc" id="popDesc">—</p>
      <div class="row">
        <button class="btn" id="backBtn">back</button>
        <button class="btn primary" id="launchBtn">launch</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.160.0";
    import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // ===== Worlds (planets) =====
    // You can change these paths later to whatever you want.
    const WORLDS = [
      {
        name: "Cipher Lab",
        tag: "tools",
        desc: "Ciphers + cipher tools hub.",
        url: "/tools/cipherlab/index.html",
        hue: 155, // teal
        size: 1.32,
        orbitR: 7.6,
        orbitSpeed: 0.28,
        orbitPhase: 0.0,
        yBase: -0.25
      },
      {
        name: "CS2 Market",
        tag: "tracker",
        desc: "Market / price tracker tool for CS2 items.",
        url: "/tools/cs2-market/index.html",
        hue: 205, // blue-cyan
        size: 1.18,
        orbitR: 8.45,
        orbitSpeed: 0.235,
        orbitPhase: Math.PI * 0.65,
        yBase: 0.35
      }
    ];

    // ===== DOM =====
    const fade = document.getElementById("fade");
    const popup = document.getElementById("popup");
    const popTitle = document.getElementById("popTitle");
    const popTag = document.getElementById("popTag");
    const popDesc = document.getElementById("popDesc");
    const backBtn = document.getElementById("backBtn");
    const launchBtn = document.getElementById("launchBtn");

    const soon = document.getElementById("soon");
    const soonPath = document.getElementById("soonPath");
    document.getElementById("soonClose").addEventListener("click", ()=> soon.classList.remove("on"));
    addEventListener("keydown", (e)=>{ if(e.key === "Escape") { soon.classList.remove("on"); exitFocus(true); } });

    // ===== Scene / Renderer =====
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x05070c, 0.020);

    const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 3000);
    camera.position.set(0, 2.0, 40);

    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x05070c, 1);
    document.body.appendChild(renderer.domElement);

    // Infinite dome
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(900, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x05070c, side: THREE.BackSide })
    ));

    function addStars(count, size, rMin, rMax, opacity){
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(count*3);
      for(let i=0;i<count;i++){
        const r = rMin + Math.random()*(rMax-rMin);
        const theta = Math.random()*Math.PI*2;
        const u = Math.random()*2 - 1;
        const phi = Math.acos(u);
        pos[i*3+0] = r*Math.sin(phi)*Math.cos(theta);
        pos[i*3+1] = r*Math.cos(phi);
        pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
      }
      geo.setAttribute("position", new THREE.BufferAttribute(pos,3));
      const mat = new THREE.PointsMaterial({ size, transparent:true, opacity, depthWrite:false });
      const pts = new THREE.Points(geo, mat);
      scene.add(pts);
      return pts;
    }
    const starsNear = addStars(1400, 1.0, 120, 320, 0.75);
    const starsFar  = addStars(2200, 1.3, 260, 820, 0.55);

    // Lights (Tron vibe)
    scene.add(new THREE.AmbientLight(0x88aaff, 0.42));
    const key = new THREE.DirectionalLight(0x7cffb2, 1.05);
    key.position.set(6,10,6);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x6ea8ff, 0.85);
    rim.position.set(-10,2,-6);
    scene.add(rim);

    // Floor grid (no walls)
    const floor = new THREE.GridHelper(220, 220, 0x7cffb2, 0x1f3b33);
    floor.material.transparent = true;
    floor.material.opacity = 0.10;
    floor.position.y = -2.8;
    scene.add(floor);

    // ===== Core planet =====
    const core = new THREE.Group();
    scene.add(core);

    const coreRadius = 3.1; // used for anti-clipping spacing
    const coreGeo = new THREE.IcosahedronGeometry(coreRadius, 5);
    const coreMat = new THREE.MeshStandardMaterial({
      color: 0x07101b,
      roughness: 0.20,
      metalness: 0.62,
      emissive: 0x08101c,
      emissiveIntensity: 1.0
    });
    const coreMesh = new THREE.Mesh(coreGeo, coreMat);
    core.add(coreMesh);

    const coreWire = new THREE.Mesh(coreGeo, new THREE.MeshBasicMaterial({
      color:0x7cffb2, wireframe:true, transparent:true, opacity:0.10
    }));
    core.add(coreWire);

    const coreGlow = new THREE.Mesh(
      new THREE.SphereGeometry(coreRadius*1.22, 56, 56),
      new THREE.MeshBasicMaterial({ color:0x6ea8ff, transparent:true, opacity:0.075, depthWrite:false })
    );
    core.add(coreGlow);

    const coreGlow2 = new THREE.Mesh(
      new THREE.SphereGeometry(coreRadius*1.40, 56, 56),
      new THREE.MeshBasicMaterial({ color:0x7cffb2, transparent:true, opacity:0.03, depthWrite:false })
    );
    core.add(coreGlow2);

    // Tron “data ring” around the core (subtle)
    const dataRing = new THREE.Mesh(
      new THREE.TorusGeometry(coreRadius*1.95, 0.06, 12, 220),
      new THREE.MeshBasicMaterial({ color:0x6ea8ff, transparent:true, opacity:0.14, depthWrite:false })
    );
    dataRing.rotation.x = Math.PI/2;
    scene.add(dataRing);

    // ===== OrbitControls =====
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 7.0;
    controls.maxDistance = 30;
    controls.target.set(0, -0.2, 0);

    // ===== Intro warp (LOCK input) =====
    const warpGroup = new THREE.Group();
    scene.add(warpGroup);

    const warpLen = 190, warpRadius = 10.5, warpCount = 3400;
    const warpGeo = new THREE.BufferGeometry();
    const warpPos = new Float32Array(warpCount*3);
    const warpCol = new Float32Array(warpCount*3);

    for(let i=0;i<warpCount;i++){
      const z = -Math.random()*warpLen;
      const a = Math.random()*Math.PI*2;
      const r = warpRadius * (0.35 + Math.random()*0.65);
      warpPos[i*3+0] = Math.cos(a)*r;
      warpPos[i*3+1] = Math.sin(a)*r;
      warpPos[i*3+2] = z;

      const g = 0.6 + Math.random()*0.4;
      const b = 0.55 + Math.random()*0.45;
      warpCol[i*3+0] = 0.22;
      warpCol[i*3+1] = g;
      warpCol[i*3+2] = b;
    }
    warpGeo.setAttribute("position", new THREE.BufferAttribute(warpPos,3));
    warpGeo.setAttribute("color", new THREE.BufferAttribute(warpCol,3));

    const warpMat = new THREE.PointsMaterial({
      size: 0.10,
      vertexColors: true,
      transparent: true,
      opacity: 0.0,
      depthWrite: false
    });
    const warpPts = new THREE.Points(warpGeo, warpMat);
    warpGroup.add(warpPts);

    function easeOutCubic(x){ return 1 - Math.pow(1-x, 3); }
    function easeInOutQuad(t){ return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
    let intro = true;
    let introT = 0;

    function lockControls(on){
      controls.enabled = !on;
      // prevents wheel-zoom / drag during intro/focus animations
      renderer.domElement.style.pointerEvents = on ? "none" : "auto";
    }
    lockControls(true);

    // ===== Tron planet texture =====
    function makeTronTexture(seed=1.2, hue=160){
      const c = document.createElement("canvas");
      c.width = 1024; c.height = 512;
      const ctx = c.getContext("2d");

      ctx.fillStyle = "rgb(6,10,18)";
      ctx.fillRect(0,0,c.width,c.height);

      // soft glow base
      const grad = ctx.createLinearGradient(0,0,c.width,c.height);
      grad.addColorStop(0, `hsla(${hue}, 95%, 65%, 0.08)`);
      grad.addColorStop(0.5, `hsla(${hue+35}, 95%, 65%, 0.06)`);
      grad.addColorStop(1, `hsla(${hue-40}, 95%, 65%, 0.05)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,c.width,c.height);

      // clean circuit bands
      ctx.lineWidth = 2;
      for(let i=0;i<170;i++){
        const y = (i/170) * c.height;
        const amp = 12 + (i%9)*3;
        const freq = 0.008 + (i%7)*0.001;
        ctx.strokeStyle = `hsla(${hue}, 95%, 65%, ${0.018 + (i%7)*0.012})`;
        ctx.beginPath();
        for(let x=0;x<c.width;x+=10){
          const yy = y + Math.sin((x*freq) + seed + i*0.14) * amp;
          if(x===0) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
        }
        ctx.stroke();
      }

      // nodes
      for(let i=0;i<650;i++){
        const x = Math.random()*c.width;
        const y = Math.random()*c.height;
        const r = 1 + Math.random()*2.2;
        ctx.fillStyle = `hsla(${hue+30}, 95%, 65%, ${0.03 + Math.random()*0.10})`;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }

      // vignette
      const v = ctx.createRadialGradient(c.width/2,c.height/2,130,c.width/2,c.height/2,430);
      v.addColorStop(0, "rgba(0,0,0,0)");
      v.addColorStop(1, "rgba(0,0,0,0.62)");
      ctx.fillStyle = v;
      ctx.fillRect(0,0,c.width,c.height);

      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      return tex;
    }

    // ===== Build orbiting planets =====
    const worldsGroup = new THREE.Group();
    scene.add(worldsGroup);

    const worlds = WORLDS.map((w, i)=>{
      const g = new THREE.Group();

      const tex = makeTronTexture(1.1 + i*0.7, w.hue);
      const mat = new THREE.MeshStandardMaterial({
        map: tex,
        color: 0xffffff,
        roughness: 0.22,
        metalness: 0.38,
        emissive: new THREE.Color().setHSL((w.hue%360)/360, 0.95, 0.10),
        emissiveIntensity: 1.2
      });

      const planet = new THREE.Mesh(new THREE.SphereGeometry(w.size, 64, 64), mat);
      planet.userData.world = w;
      g.add(planet);

      // atmosphere glow
      const atmo = new THREE.Mesh(
        new THREE.SphereGeometry(w.size*1.11, 64, 64),
        new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(((w.hue+5)%360)/360, 0.95, 0.62),
          transparent:true,
          opacity: 0.11,
          depthWrite:false
        })
      );
      g.add(atmo);

      // subtle ring (varies per planet)
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(w.size*1.35, w.size*1.65, 180),
        new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(((w.hue+40)%360)/360, 0.85, 0.62),
          transparent:true,
          opacity: 0.05,
          side: THREE.DoubleSide,
          depthWrite:false
        })
      );
      ring.rotation.x = Math.PI/2.2;
      ring.rotation.y = 0.7 + i*0.35;
      g.add(ring);

      worldsGroup.add(g);

      return {
        world: w,
        group: g,
        planet,
        atmo,
        ring,
        tex,
        t: w.orbitPhase,
        hot: 0
      };
    });

    // ===== Focus & camera follow rules =====
    // Key rule you asked: camera anchor is always oriented w.r.t. center planet,
    // so camera never goes "between" the moon and the core (prevents clipping through core).
    let focused = false;
    let focusedWorld = null;
    let focusOffset = new THREE.Vector3(); // computed each frame from core->moon direction (not static)
    let isAnimating = false;

    // Home viewpoint (where we return on back)
    const homeCamPos = new THREE.Vector3(0, 3.0, 14.8);
    const homeTarget = new THREE.Vector3(0, -0.2, 0);

    // temp vectors
    const vCore = new THREE.Vector3(0,0,0);
    const vMoon = new THREE.Vector3();
    const vDirOut = new THREE.Vector3();
    const vUp = new THREE.Vector3(0,1,0);
    const vSide = new THREE.Vector3();

    function showPopup(w){
      popTitle.textContent = w.name;
      popTag.textContent = w.tag;
      popDesc.textContent = w.desc;
      popup.classList.add("on");
    }
    function hidePopup(){
      popup.classList.remove("on");
    }

    function computeFocusCamera(moonWorldPos, moonRadius){
      // direction from core -> moon
      vDirOut.copy(moonWorldPos).sub(vCore).normalize();

      // side vector for cinematic offset
      vSide.crossVectors(vUp, vDirOut).normalize();

      // Camera distance: ensure core never clips into view between camera and moon.
      // Place camera "outside" further along vDirOut (away from core).
      // Add extra padding based on core radius + moon radius.
      const baseDist = 6.6 + coreRadius*0.25 + moonRadius*0.35;
      const upDist = 1.65;
      const sideDist = 1.15;

      const camPos = moonWorldPos.clone()
        .addScaledVector(vDirOut, baseDist)
        .addScaledVector(vUp, upDist)
        .addScaledVector(vSide, sideDist);

      return camPos;
    }

    function enterFocus(worldObj){
      focused = true;
      focusedWorld = worldObj;
      showPopup(worldObj);
    }

    async function exitFocus(smooth=false){
      if(!focused && !smooth) return;
      focused = false;
      focusedWorld = null;
      hidePopup();

      if(smooth){
        isAnimating = true;
        lockControls(true);

        const startPos = camera.position.clone();
        const startTarget = controls.target.clone();

        const t0 = performance.now();
        const dur = 700;

        function step(now){
          const t = Math.min((now - t0)/dur, 1);
          const e = easeInOutQuad(t);

          camera.position.lerpVectors(startPos, homeCamPos, e);
          controls.target.lerpVectors(startTarget, homeTarget, e);
          controls.update();

          if(t < 1) requestAnimationFrame(step);
          else {
            isAnimating = false;
            lockControls(false);
          }
        }
        requestAnimationFrame(step);
      } else {
        // instant (rare; mostly for emergency)
        camera.position.copy(homeCamPos);
        controls.target.copy(homeTarget);
        controls.update();
      }
    }

    backBtn.addEventListener("click", ()=> exitFocus(true));

    // ===== Click selection =====
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hovering = null;

    addEventListener("pointermove", (ev)=>{
      if(intro || isAnimating) return;

      mouse.x = (ev.clientX/innerWidth)*2 - 1;
      mouse.y = -(ev.clientY/innerHeight)*2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(worlds.map(w=>w.planet), false);

      if(hits.length){
        hovering = hits[0].object;
        document.body.style.cursor = "pointer";
      } else {
        hovering = null;
        document.body.style.cursor = "default";
      }
    });

    addEventListener("click", ()=>{
      if(intro || isAnimating) return;
      if(!hovering) return;

      const w = hovering.userData.world;

      // animate into focus (smooth)
      isAnimating = true;
      lockControls(true);

      const moonMesh = hovering;
      moonMesh.getWorldPosition(vMoon);

      const moonRadius = worlds.find(x=>x.planet === moonMesh)?.world.size ?? 1.2;
      const endPos = computeFocusCamera(vMoon, moonRadius);

      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();

      // target always center planet while focused (your request)
      const endTarget = homeTarget.clone(); // center lock

      const t0 = performance.now();
      const dur = 600;

      function step(now){
        const t = Math.min((now - t0)/dur, 1);
        const e = easeInOutQuad(t);

        camera.position.lerpVectors(startPos, endPos, e);
        controls.target.lerpVectors(startTarget, endTarget, e);
        controls.update();

        if(t < 1) requestAnimationFrame(step);
        else {
          isAnimating = false;
          lockControls(false);
          enterFocus(w);

          // store offset relative to current moon position (we’ll recompute along core->moon each frame anyway)
          focusOffset.copy(camera.position).sub(vMoon);
        }
      }
      requestAnimationFrame(step);
    });

    // ===== Launch with existence check =====
    async function exists(url){
      try{
        const res = await fetch(url, { method:"HEAD", cache:"no-store" });
        return res.ok;
      }catch(_){
        return false;
      }
    }

    let warping = false;

    async function warpIntoFocused(){
      if(!focusedWorld || warping || isAnimating) return;
      warping = true;
      lockControls(true);

      const url = focusedWorld.url;
      const ok = await exists(url);

      // find mesh + position
      const moonObj = worlds.find(x => x.world === focusedWorld);
      moonObj.planet.getWorldPosition(vMoon);

      fade.classList.add("on");

      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();

      // fly “into” the moon surface from outside direction
      vDirOut.copy(vMoon).sub(vCore).normalize();
      const endPos = vMoon.clone().addScaledVector(vDirOut, -moonObj.world.size * 0.15);
      const endTarget = homeTarget.clone(); // keep looking at core during warp

      const t0 = performance.now();
      const dur = 900;

      function step(now){
        const t = Math.min((now - t0)/dur, 1);
        const e = easeInOutQuad(t);

        camera.position.lerpVectors(startPos, endPos, e);
        controls.target.lerpVectors(startTarget, endTarget, e);
        controls.update();

        if(t < 1) requestAnimationFrame(step);
        else {
          if(ok){
            location.href = url;
          } else {
            soonPath.textContent = url;
            soon.classList.add("on");
            fade.classList.remove("on");
            warping = false;
            lockControls(false);
          }
        }
      }
      requestAnimationFrame(step);
    }

    launchBtn.addEventListener("click", ()=> warpIntoFocused());

    // ===== Intro warp =====
    let last = performance.now();

    function animate(now){
      const dt = Math.min((now-last)/1000, 0.05);
      last = now;

      // Star drift
      starsNear.rotation.y += dt * 0.006;
      starsFar.rotation.y  -= dt * 0.003;

      // Core motion
      core.rotation.y += dt * 0.16;
      coreWire.rotation.y += dt * 0.11;
      coreGlow.material.opacity  = 0.070 + Math.sin(now*0.0012)*0.008;
      coreGlow2.material.opacity = 0.028 + Math.sin(now*0.0010 + 1.3)*0.007;

      dataRing.rotation.z += dt * 0.12;
      dataRing.material.opacity = 0.11 + Math.sin(now*0.0011)*0.03;

      // Floor shimmer
      floor.material.opacity = 0.09 + Math.sin(now*0.0013)*0.018;

      // Orbit worlds
      worlds.forEach((w, i)=>{
        w.t += dt * w.world.orbitSpeed;

        const rr = w.world.orbitR + Math.sin(now*0.001 + i)*0.08;
        const yy = w.world.yBase + Math.sin(now*0.0011 + i)*0.08;

        w.group.position.set(Math.cos(w.t) * rr, yy, Math.sin(w.t) * rr);

        // Planet rotation & texture drift
        w.planet.rotation.y += dt * (0.20 + i*0.06);
        w.tex.offset.x += dt * (0.004 + i*0.001);
        w.tex.offset.y += dt * (0.002 + i*0.001);

        // Neon pulse
        w.atmo.material.opacity = 0.10 + Math.sin(now*0.0015 + i)*0.02;
        w.ring.material.opacity = 0.05 + Math.sin(now*0.0012 + i*0.6)*0.02;
      });

      // Focus-follow: camera follows the focused world position,
      // but ALWAYS targets the center core and ALWAYS stays outside (away from core).
      if(focused && focusedWorld && !warping && !isAnimating){
        const moonObj = worlds.find(x => x.world === focusedWorld);
        moonObj.planet.getWorldPosition(vMoon);

        const camPos = computeFocusCamera(vMoon, moonObj.world.size);
        camera.position.copy(camPos);

        // target stays on the core (center) so camera never swings through it
        controls.target.copy(homeTarget);
        controls.update();
      }

      // Intro warp (locks input)
      if(intro){
        introT += dt;
        const t = Math.min(introT / 2.15, 1);
        const e = easeOutCubic(t);

        camera.position.z = 40 - e * 25.2;
        camera.position.y = 2.0 + (3.0 - 2.0) * e;
        controls.target.copy(homeTarget);

        const vel = (1 - t) * (1 - t);
        const speed = 50 * vel;

        // fade out before stop
        const fadeOut = t < 0.75 ? (t / 0.75) : (1 - (t - 0.75) / 0.25);
        warpMat.opacity = Math.max(0, Math.min(0.95, fadeOut*0.95));

        if(speed > 0.05){
          const arr = warpGeo.attributes.position.array;
          for(let i=0;i<warpCount;i++){
            const z = arr[i*3+2] + dt * speed;
            arr[i*3+2] = (z > 6) ? (-warpLen + Math.random()*-10) : z;
          }
          warpGeo.attributes.position.needsUpdate = true;
        }

        if(t >= 1){
          intro = false;
          warpGroup.visible = false;
          camera.position.copy(homeCamPos);
          controls.target.copy(homeTarget);
          lockControls(false);
        } else {
          warpGroup.visible = true;
        }
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    addEventListener("resize", ()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // Start warp with input locked
    // (we already called lockControls(true))
  </script>
</body>
</html>
