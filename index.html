<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>kvorr</title>
  <style>
    html, body { height:100%; margin:0; overflow:hidden; background:#05070c; }
    canvas { display:block; }

    /* Labels (CSS2DRenderer) */
    .label {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
      color: rgba(230,245,255,.92);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(124,255,178,.18);
      background: rgba(6,10,18,.55);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
      white-space: nowrap;
      transform: translate(-50%, -100%);
      user-select: none;
      pointer-events: none;
    }
    .label.section {
      border-color: rgba(110,168,255,.22);
      background: rgba(10,16,28,.55);
    }

    /* Overlay when focused on a planet */
    .ui {
      position: fixed; inset: 0; z-index: 20;
      display: grid; place-items: end center;
      padding: 18px;
      pointer-events: none;
    }
    .panel {
      pointer-events: auto;
      width: min(760px, calc(100vw - 36px));
      border-radius: 22px;
      border: 1px solid rgba(124,255,178,.18);
      background: rgba(6,10,18,.75);
      backdrop-filter: blur(12px);
      box-shadow: 0 26px 90px rgba(0,0,0,.62);
      padding: 14px;
      display: none;
    }
    .panel.on { display:block; }

    .head {
      display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
      margin-bottom: 10px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      color: rgba(230,245,255,.92);
    }
    .title {
      margin:0;
      font-size: 13px;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: rgba(110,168,255,.95);
    }
    .desc {
      margin:6px 0 0;
      font-size: 12px;
      color: rgba(200,220,255,.72);
      line-height: 1.5;
    }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end; }

    .btn {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(110,168,255,.20);
      background: rgba(10,16,28,.45);
      color: rgba(230,245,255,.9);
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(124,255,178,.38); background: rgba(10,16,28,.62); }
    .btn.primary { border-color: rgba(124,255,178,.26); background: rgba(124,255,178,.10); }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    @media (max-width: 720px){ .grid { grid-template-columns: 1fr; } }

    .moonCard{
      border-radius: 18px;
      border: 1px solid rgba(110,168,255,.16);
      background: rgba(10,16,28,.35);
      padding: 12px;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    .moonCard:hover{
      transform: translateY(-1px);
      border-color: rgba(124,255,178,.30);
      background: rgba(10,16,28,.55);
    }
    .moonName{
      margin:0;
      font-size: 13px;
      color: rgba(124,255,178,.92);
      letter-spacing: .4px;
    }
    .moonMeta{
      margin:6px 0 0;
      font-size: 12px;
      color: rgba(200,220,255,.72);
      line-height: 1.45;
    }

    /* Subtle fade for warps */
    .fade{
      position: fixed; inset: 0; z-index: 15;
      pointer-events:none;
      background: radial-gradient(900px 700px at 50% 50%, rgba(124,255,178,.12), rgba(0,0,0,.92));
      opacity: 0;
      transition: opacity .35s ease;
    }
    .fade.on{ opacity: 1; }
  </style>
</head>
<body>
  <div class="fade" id="fade"></div>

  <div class="ui">
    <div class="panel" id="panel">
      <div class="head">
        <div>
          <h3 class="title" id="panelTitle">—</h3>
          <p class="desc" id="panelDesc">—</p>
        </div>
        <div class="row">
          <button class="btn" id="backBtn">back</button>
        </div>
      </div>
      <div class="grid" id="moonGrid"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://esm.sh/three@0.160.0";
    import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { CSS2DRenderer, CSS2DObject } from "https://esm.sh/three@0.160.0/examples/jsm/renderers/CSS2DRenderer.js";

    // =========================
    // CONFIG (no fake moons)
    // =========================
    // Planets represent "first subdirectories": tools/, games/, etc.
    // GitHub Pages can't auto-list dirs, so we hardcode ONLY what exists.
    // Add new moons when you create their pages.
    const SOLAR = [
      {
        id: "tools",
        label: "TOOLS",
        desc: "Utilities and labs.",
        hue: 155,
        orbitR: 9.5,
        orbitSpeed: 0.08,
        size: 2.0,
        incline: 0.18,
        moons: [
          { id:"cipherlab", label:"Cipher Lab", desc:"Classical + modern crypto + transforms.", url:"/tools/cipherlab/index.html", hue: 155, size: 0.62, r: 3.0, speed: 0.45, phase: 0.4 },
          { id:"cs2", label:"CS2 Market", desc:"Watchlist + portfolio + signals (UI).", url:"/tools/cs2-market/index.html", hue: 210, size: 0.56, r: 3.7, speed: 0.36, phase: 2.0 },
        ]
      },

      // Add this later ONLY once you have at least one /games/<something>/index.html:
      // {
      //   id: "games",
      //   label: "GAMES",
      //   desc: "Playable projects.",
      //   hue: 205,
      //   orbitR: 14.0,
      //   orbitSpeed: 0.06,
      //   size: 2.4,
      //   incline: -0.12,
      //   moons: [
      //     { label:"Claw", desc:"Arcade claw project", url:"/games/claw/index.html", hue:205, size:0.70, r:3.4, speed:0.32, phase:1.2 }
      //   ]
      // }
    ].filter(p => (p.moons && p.moons.length)); // don’t show empty planets

    // =========================
    // DOM
    // =========================
    const panel = document.getElementById("panel");
    const panelTitle = document.getElementById("panelTitle");
    const panelDesc = document.getElementById("panelDesc");
    const moonGrid = document.getElementById("moonGrid");
    const backBtn = document.getElementById("backBtn");
    const fade = document.getElementById("fade");

    // =========================
    // Scene
    // =========================
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x05070c, 0.018);

    const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 4000);
    camera.position.set(0, 3.0, 22);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x05070c, 1);
    document.body.appendChild(renderer.domElement);

    // Labels renderer
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(innerWidth, innerHeight);
    labelRenderer.domElement.style.position = "fixed";
    labelRenderer.domElement.style.inset = "0";
    labelRenderer.domElement.style.pointerEvents = "none";
    document.body.appendChild(labelRenderer.domElement);

    // Infinite dome (no cube walls)
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(1200, 32, 32),
      new THREE.MeshBasicMaterial({ color: 0x05070c, side: THREE.BackSide })
    ));

    // Stars
    function addStars(count, size, rMin, rMax, opacity){
      const geo = new THREE.BufferGeometry();
      const pos = new Float32Array(count*3);
      for(let i=0;i<count;i++){
        const r = rMin + Math.random()*(rMax-rMin);
        const theta = Math.random()*Math.PI*2;
        const u = Math.random()*2 - 1;
        const phi = Math.acos(u);
        pos[i*3+0] = r*Math.sin(phi)*Math.cos(theta);
        pos[i*3+1] = r*Math.cos(phi);
        pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
      }
      geo.setAttribute("position", new THREE.BufferAttribute(pos,3));
      const mat = new THREE.PointsMaterial({ size, transparent:true, opacity, depthWrite:false });
      const pts = new THREE.Points(geo, mat);
      scene.add(pts);
      return pts;
    }
    const starsNear = addStars(1500, 1.0, 160, 380, 0.75);
    const starsFar  = addStars(2600, 1.3, 320, 980, 0.55);

    // Lights
    scene.add(new THREE.AmbientLight(0x88aaff, 0.40));
    const key = new THREE.DirectionalLight(0x7cffb2, 1.0);
    key.position.set(8,12,8);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x6ea8ff, 0.85);
    rim.position.set(-12,3,-8);
    scene.add(rim);

    // Floor grid (subtle)
    const floor = new THREE.GridHelper(360, 360, 0x7cffb2, 0x1f3b33);
    floor.material.transparent = true;
    floor.material.opacity = 0.075;
    floor.position.y = -3.1;
    scene.add(floor);

    // =========================
    // Sun (center)
    // =========================
    const sun = new THREE.Group();
    scene.add(sun);

    const sunGeo = new THREE.IcosahedronGeometry(3.3, 6);
    const sunMat = new THREE.MeshStandardMaterial({
      color: 0x07101b, roughness: 0.18, metalness: 0.62,
      emissive: 0x08101c, emissiveIntensity: 1.0
    });
    const sunMesh = new THREE.Mesh(sunGeo, sunMat);
    sun.add(sunMesh);

    const sunWire = new THREE.Mesh(sunGeo, new THREE.MeshBasicMaterial({
      color:0x7cffb2, wireframe:true, transparent:true, opacity:0.10
    }));
    sun.add(sunWire);

    const sunGlow = new THREE.Mesh(
      new THREE.SphereGeometry(4.2, 64, 64),
      new THREE.MeshBasicMaterial({ color:0x6ea8ff, transparent:true, opacity:0.07, depthWrite:false })
    );
    sun.add(sunGlow);

    // =========================
    // Controls
    // =========================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 10;
    controls.maxDistance = 38;
    controls.target.set(0, -0.2, 0);

    const homeCamPos = new THREE.Vector3(0, 3.0, 22);
    const homeTarget = new THREE.Vector3(0, -0.2, 0);

    // =========================
    // Tron textures
    // =========================
    function makeTronTexture(seed=1.2, hue=160){
      const c = document.createElement("canvas");
      c.width = 1024; c.height = 512;
      const ctx = c.getContext("2d");

      ctx.fillStyle = "rgb(6,10,18)";
      ctx.fillRect(0,0,c.width,c.height);

      const grad = ctx.createLinearGradient(0,0,c.width,c.height);
      grad.addColorStop(0, `hsla(${hue}, 95%, 65%, 0.08)`);
      grad.addColorStop(0.5, `hsla(${hue+35}, 95%, 65%, 0.06)`);
      grad.addColorStop(1, `hsla(${hue-40}, 95%, 65%, 0.05)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,c.width,c.height);

      ctx.lineWidth = 2;
      for(let i=0;i<180;i++){
        const y = (i/180) * c.height;
        const amp = 12 + (i%9)*3;
        const freq = 0.008 + (i%7)*0.001;
        ctx.strokeStyle = `hsla(${hue}, 95%, 65%, ${0.016 + (i%8)*0.010})`;
        ctx.beginPath();
        for(let x=0;x<c.width;x+=10){
          const yy = y + Math.sin((x*freq) + seed + i*0.14) * amp;
          if(x===0) ctx.moveTo(x,yy); else ctx.lineTo(x,yy);
        }
        ctx.stroke();
      }

      for(let i=0;i<750;i++){
        const x = Math.random()*c.width;
        const y = Math.random()*c.height;
        const r = 1 + Math.random()*2.2;
        ctx.fillStyle = `hsla(${hue+30}, 95%, 65%, ${0.03 + Math.random()*0.09})`;
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
      }

      const v = ctx.createRadialGradient(c.width/2,c.height/2,120,c.width/2,c.height/2,440);
      v.addColorStop(0, "rgba(0,0,0,0)");
      v.addColorStop(1, "rgba(0,0,0,0.62)");
      ctx.fillStyle = v;
      ctx.fillRect(0,0,c.width,c.height);

      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      return tex;
    }

    function makeLabel(text, kind="moon"){
      const div = document.createElement("div");
      div.className = "label" + (kind==="planet" ? " section" : "");
      div.textContent = text;
      return new CSS2DObject(div);
    }

    // =========================
    // Build planets + moons
    // =========================
    const system = new THREE.Group();
    scene.add(system);

    const objects = []; // clickable meshes
    const planets = [];

    SOLAR.forEach((p, i)=>{
      const planetGroup = new THREE.Group();
      planetGroup.rotation.z = p.incline || 0;
      system.add(planetGroup);

      const tex = makeTronTexture(1.1 + i*0.77, p.hue);
      const mat = new THREE.MeshStandardMaterial({
        map: tex,
        roughness: 0.22,
        metalness: 0.40,
        emissive: new THREE.Color().setHSL((p.hue%360)/360, 0.95, 0.10),
        emissiveIntensity: 1.15
      });

      const planetMesh = new THREE.Mesh(new THREE.SphereGeometry(p.size, 64, 64), mat);
      planetMesh.userData = { type:"planet", planetId: p.id };
      planetGroup.add(planetMesh);
      objects.push(planetMesh);

      // glow shell
      const atmo = new THREE.Mesh(
        new THREE.SphereGeometry(p.size*1.12, 64, 64),
        new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL((p.hue%360)/360, 0.95, 0.62), transparent:true, opacity:0.10, depthWrite:false })
      );
      planetGroup.add(atmo);

      // label above planet
      const lbl = makeLabel(p.label, "planet");
      lbl.position.set(0, p.size + 1.0, 0);
      planetGroup.add(lbl);

      // moons
      const moonObjs = [];
      p.moons.forEach((m, mi)=>{
        const mg = new THREE.Group();
        planetGroup.add(mg);

        const mTex = makeTronTexture(2.1 + i*1.1 + mi*0.9, m.hue);
        const mMat = new THREE.MeshStandardMaterial({
          map: mTex,
          roughness: 0.20,
          metalness: 0.35,
          emissive: new THREE.Color().setHSL((m.hue%360)/360, 0.95, 0.12),
          emissiveIntensity: 1.35
        });

        const moonMesh = new THREE.Mesh(new THREE.SphereGeometry(m.size, 48, 48), mMat);
        moonMesh.userData = { type:"moon", planetId: p.id, moonId: m.id, url: m.url };
        mg.add(moonMesh);
        objects.push(moonMesh);

        const mlbl = makeLabel(m.label, "moon");
        mlbl.position.set(0, m.size + 0.7, 0);
        mg.add(mlbl);

        moonObjs.push({ def:m, group: mg, mesh: moonMesh, t: m.phase || (mi * Math.PI*2/p.moons.length) });
      });

      planets.push({
        def: p,
        group: planetGroup,
        mesh: planetMesh,
        tex,
        t: Math.random()*Math.PI*2,
        moons: moonObjs
      });
    });

    // =========================
    // Picking
    // =========================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hovering = null;

    let focused = null; // planet def
    let isAnimating = false;

    function easeInOut(t){ return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }

    function setPanel(planetDef){
      focused = planetDef;
      panel.classList.add("on");
      panelTitle.textContent = planetDef.label;
      panelDesc.textContent = planetDef.desc;

      moonGrid.innerHTML = "";
      planetDef.moons.forEach(m=>{
        const card = document.createElement("div");
        card.className = "moonCard";
        card.innerHTML = `
          <p class="moonName">${m.label}</p>
          <p class="moonMeta">${m.desc}</p>
        `;
        card.addEventListener("click", ()=> warpToUrl(m.url, m.id));
        moonGrid.appendChild(card);
      });
    }

    function clearPanel(){
      focused = null;
      panel.classList.remove("on");
      moonGrid.innerHTML = "";
    }

    backBtn.addEventListener("click", ()=> {
      clearPanel();
      smoothReturnHome();
    });

    function smoothReturnHome(){
      isAnimating = true;
      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();
      const t0 = performance.now();
      const dur = 720;

      function step(now){
        const t = Math.min((now - t0)/dur, 1);
        const e = easeInOut(t);
        camera.position.lerpVectors(startPos, homeCamPos, e);
        controls.target.lerpVectors(startTarget, homeTarget, e);
        controls.update();
        if(t < 1) requestAnimationFrame(step);
        else isAnimating = false;
      }
      requestAnimationFrame(step);
    }

    function focusPlanet(planetDef){
      isAnimating = true;

      // get planet world position
      const planet = planets.find(x=>x.def.id === planetDef.id);
      const wp = new THREE.Vector3();
      planet.mesh.getWorldPosition(wp);

      // camera position: outside of orbit direction (wp direction from center)
      const dir = wp.clone().normalize();
      const side = new THREE.Vector3(0,1,0).cross(dir).normalize();

      const camPos = wp.clone()
        .addScaledVector(dir, 9.0)
        .addScaledVector(new THREE.Vector3(0,1,0), 2.0)
        .addScaledVector(side, 1.2);

      const startPos = camera.position.clone();
      const startTarget = controls.target.clone();
      const t0 = performance.now();
      const dur = 620;

      function step(now){
        const t = Math.min((now - t0)/dur, 1);
        const e = easeInOut(t);
        camera.position.lerpVectors(startPos, camPos, e);
        controls.target.lerpVectors(startTarget, homeTarget, e); // keep aiming at sun
        controls.update();
        if(t < 1) requestAnimationFrame(step);
        else {
          isAnimating = false;
          setPanel(planetDef);
        }
      }
      requestAnimationFrame(step);
    }

    // Warp to URL (simple, clean)
    function warpToUrl(url){
      if(isAnimating) return;
      fade.classList.add("on");
      setTimeout(()=> { location.href = url; }, 380);
    }

    addEventListener("pointermove", (ev)=>{
      if(isAnimating) return;
      mouse.x = (ev.clientX/innerWidth)*2 - 1;
      mouse.y = -(ev.clientY/innerHeight)*2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(objects, false);
      if(hits.length){
        hovering = hits[0].object;
        document.body.style.cursor = "pointer";
      }else{
        hovering = null;
        document.body.style.cursor = "default";
      }
    });

    addEventListener("click", ()=>{
      if(isAnimating || !hovering) return;
      const data = hovering.userData || {};
      if(data.type === "planet"){
        const p = SOLAR.find(x=>x.id === data.planetId);
        if(p) focusPlanet(p);
      } else if(data.type === "moon"){
        warpToUrl(data.url);
      }
    });

    addEventListener("keydown",(e)=>{
      if(e.key === "Escape"){
        clearPanel();
        smoothReturnHome();
      }
    });

    // =========================
    // Animate
    // =========================
    let last = performance.now();
    function animate(now){
      const dt = Math.min((now-last)/1000, 0.05);
      last = now;

      starsNear.rotation.y += dt * 0.006;
      starsFar.rotation.y  -= dt * 0.003;

      sun.rotation.y += dt * 0.12;
      sunWire.rotation.y += dt * 0.08;
      sunGlow.material.opacity = 0.06 + Math.sin(now*0.0012)*0.01;

      floor.material.opacity = 0.065 + Math.sin(now*0.0013)*0.012;

      // Move planets around the sun + drift textures
      planets.forEach((p, i)=>{
        p.t += dt * p.def.orbitSpeed;
        const rr = p.def.orbitR + Math.sin(now*0.001 + i)*0.10;
        const y = -0.2 + Math.sin(now*0.0011 + i)*0.12;

        p.group.position.set(Math.cos(p.t)*rr, y, Math.sin(p.t)*rr);
        p.tex.offset.x += dt * (0.002 + i*0.001);
        p.tex.offset.y += dt * (0.001 + i*0.001);

        // Moons orbit around their planet
        p.moons.forEach((m, mi)=>{
          m.t += dt * m.def.speed;
          const mr = m.def.r;
          const my = Math.sin(now*0.0015 + mi)*0.20;
          m.group.position.set(Math.cos(m.t)*mr, my, Math.sin(m.t)*mr);
        });
      });

      controls.update();
      renderer.render(scene, camera);
      labelRenderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);

    addEventListener("resize", ()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      labelRenderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
